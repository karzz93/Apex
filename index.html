<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#16181d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#15171c">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Apexbook — Track Day Diary</title>
<style>
:root{
  --bg:#15171c; --bg2:#1c1f26; --shell:#101216;
  --card:#f2f0ea; --card2:#e8e5dd; --card-ink:#1b1d22; --card-sub:#5c5f66;
  --ink:#eef0f3; --sub:#9aa0ab; --line:#2a2e37; --cardline:#d8d4ca;
  --accent:#ff521f; --accent-ink:#fff; --accent-soft:rgba(255,82,31,.14);
  --green:#3fae5a; --amber:#e8a13c; --red:#d4452f; --blue:#4a90d9; --grey:#8a8f99;
  --pb:#ffd23f;
  --r:16px; --rs:10px;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
[data-theme="light"]{
  --bg:#eceae4; --bg2:#f4f2ec; --shell:#e2dfd7;
  --ink:#1b1d22; --sub:#5c5f66; --line:#d8d4ca;
  --card:#ffffff; --card2:#f4f2ec; --card-ink:#1b1d22; --card-sub:#5c5f66; --cardline:#e2dfd7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  min-height:100vh; padding-bottom:calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain;
}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}
::selection{background:var(--accent);color:#fff}

/* ---------- app shell ---------- */
#app{max-width:640px;margin:0 auto;padding:0 14px}
.topbar{
  position:sticky;top:0;z-index:40;background:linear-gradient(var(--bg) 78%,transparent);
  padding:calc(10px + env(safe-area-inset-top)) 0 10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.04em;font-size:1.02rem}
.brand svg{display:block}
.topbar .side{display:flex;align-items:center;gap:8px}
.statuschip{
  display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--sub);
  border:1px solid var(--line);border-radius:99px;padding:4px 9px;background:var(--bg2);
}
.statuschip .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.statuschip.off .dot{background:var(--amber)}
.iconbtn{
  width:38px;height:38px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--bg2);border:1px solid var(--line);color:var(--ink);flex:none;
}
.iconbtn:active{transform:scale(.94)}

/* bottom nav */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:color-mix(in srgb,var(--shell) 92%,transparent);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav.tabs button{
  flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 2px;color:var(--sub);font-size:.64rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  border-radius:12px;
}
nav.tabs button svg{width:22px;height:22px}
nav.tabs button.on{color:var(--accent)}
nav.tabs button:active{transform:translateY(1px)}

/* ---------- typography ---------- */
h1.page{font-size:1.55rem;font-weight:850;letter-spacing:-.01em;margin:8px 0 4px}
.eyebrow{font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
.eyebrow.acc{color:var(--accent)}
.laptime{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;letter-spacing:-.01em}
.big-time{font-size:2.1rem;line-height:1}
.muted{color:var(--sub)}
.small{font-size:.8rem}

/* track-line motif */
.trackline{height:22px;margin:2px 0 10px;opacity:.55}
.trackline path{fill:none;stroke:var(--line);stroke-width:3;stroke-linecap:round}
.trackline path.kerb{stroke:var(--accent);stroke-dasharray:4 6;stroke-width:3}

/* ---------- cards ---------- */
.card{
  background:var(--card);color:var(--card-ink);border-radius:var(--r);
  padding:14px;margin:10px 0;border:1px solid var(--cardline);
  box-shadow:0 1px 2px rgba(0,0,0,.18);
}
.card .muted,.card .eyebrow{color:var(--card-sub)}
.card .eyebrow.acc{color:var(--accent)}
.card.dark{background:var(--bg2);color:var(--ink);border-color:var(--line)}
.card.dark .muted,.card.dark .eyebrow{color:var(--sub)}
.card.flat{box-shadow:none}
.card.tap:active{transform:scale(.985)}
.cardhead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px}
.cardhead h3{font-size:.98rem;font-weight:800}
.linkish{color:var(--accent);font-weight:700;font-size:.8rem;background:none;padding:4px}

/* focus card — signature */
.focuscard{
  background:var(--accent);color:var(--accent-ink);border:none;border-radius:var(--r);
  padding:16px;margin:10px 0;position:relative;overflow:hidden;
}
.focuscard::after{
  content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;
  border:14px solid rgba(255,255,255,.14);
}
.focuscard .eyebrow{color:rgba(255,255,255,.85)}
.focuscard li{font-size:1.18rem;font-weight:800;line-height:1.3;margin:8px 0 0 0;list-style:none}
.focuscard li::before{content:"→ "}

/* rows, grids */
.row{display:flex;align-items:center;gap:10px}
.row.between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--card2);border-radius:var(--rs);padding:9px 10px;min-width:0}
.stat .k{font-size:.62rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--card-sub)}
.stat .v{font-size:1.05rem;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums}
.card.dark .stat{background:rgba(255,255,255,.05)}
.card.dark .stat .k{color:var(--sub)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chips.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips.scroll::-webkit-scrollbar{display:none}
.chip{
  border:1.5px solid var(--line);border-radius:99px;padding:8px 13px;font-size:.82rem;font-weight:700;
  color:var(--ink);background:var(--bg2);white-space:nowrap;flex:none;
}
.card .chip{border-color:var(--cardline);background:var(--card2);color:var(--card-ink)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.mini{padding:4px 9px;font-size:.7rem}
.tag{display:inline-block;border-radius:6px;padding:2px 7px;font-size:.66rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.tag.pb{background:var(--pb);color:#3c2f00}
.tag.wet{background:#3a6ea5;color:#fff}
.tag.dry{background:#c98a2b;color:#fff}
.tag.grey{background:var(--card2);color:var(--card-sub)}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#fff;font-weight:800;border-radius:14px;
  padding:13px 18px;font-size:.95rem;letter-spacing:.01em;width:100%;
}
.btn:active{transform:scale(.97)}
.btn.sec{background:var(--bg2);color:var(--ink);border:1.5px solid var(--line)}
.card .btn.sec{background:var(--card2);color:var(--card-ink);border-color:var(--cardline)}
.btn.ghost{background:none;color:var(--accent);border:1.5px solid var(--accent)}
.btn.slim{padding:9px 14px;font-size:.85rem;width:auto;border-radius:11px}
.btn.danger{background:var(--red)}
.btnrow{display:flex;gap:9px;margin:10px 0}
.btnrow .btn{flex:1}

/* forms */
.field{margin:10px 0}
.field label{display:block;font-size:.7rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--sub);margin-bottom:5px}
.card .field label{color:var(--card-sub)}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  width:100%;background:var(--bg2);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 12px;color:var(--ink);font-size:.95rem;appearance:none;
}
.card input[type=text],.card input[type=number],.card input[type=date],.card input[type=time],.card select,.card textarea{
  background:#fff;border-color:var(--cardline);color:var(--card-ink);
}
[data-theme="light"] input,[data-theme="light"] select,[data-theme="light"] textarea{background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
textarea{min-height:74px;resize:vertical}
input.mono{font-family:var(--mono)}
.inline2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.inline3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}

/* sliders */
.slider{margin:8px 0}
.slider .row{justify-content:space-between;margin-bottom:2px}
.slider .val{font-family:var(--mono);font-weight:800;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);height:30px}

/* lap list */
.laprow{
  display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--card2);
  font-family:var(--mono);font-variant-numeric:tabular-nums;
}
.laprow:last-child{border-bottom:none}
.laprow .n{width:26px;font-size:.72rem;color:var(--card-sub);font-weight:700}
.laprow .t{font-weight:800;font-size:1.02rem;flex:1}
.laprow.invalid .t,.laprow.io .t{text-decoration:line-through;color:var(--card-sub);font-weight:600}
.laprow .flags{display:flex;gap:4px}
.laprow .d{font-size:.72rem;width:64px;text-align:right}
.laprow .d.pos{color:var(--red)} .laprow .d.neg{color:var(--green)}
.lapbar{height:4px;border-radius:2px;background:var(--accent);opacity:.85}

/* timeline */
.tlwrap{position:relative;padding-left:22px}
.tlwrap::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--line)}
.tlitem{position:relative}
.tlitem::before{
  content:"";position:absolute;left:-20px;top:26px;width:11px;height:11px;border-radius:50%;
  background:var(--accent);border:3px solid var(--bg);
}
.yearmark{position:relative;margin:16px 0 4px;font-weight:850;font-size:1.05rem;color:var(--sub)}
.yearmark::before{content:"";position:absolute;left:-19px;top:8px;width:9px;height:9px;border-radius:2px;background:var(--sub)}

/* photos */
.photostrip{display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.photostrip::-webkit-scrollbar{display:none}
.ph{width:104px;height:78px;border-radius:10px;object-fit:cover;flex:none;background:var(--card2)}
.ph.big{width:100%;height:auto;max-height:340px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px}
.phwrap{position:relative;flex:none}
.phwrap .cap{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:.6rem;padding:3px 6px;border-radius:0 0 10px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* track map */
.mapwrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:8px;position:relative}
.mapwrap svg{width:100%;height:auto;display:block;touch-action:manipulation}
.jline{border-left:2px solid var(--card2);margin-left:6px;padding-left:14px;display:flex;flex-direction:column;gap:9px}
.jrow{display:flex;gap:9px;align-items:baseline;position:relative}
.jdot{position:absolute;left:-21px;top:2px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg)}
.jdot.jnote{background:var(--card-sub);width:8px;height:8px;left:-19.5px;top:3px}
.mapzoom{position:absolute;right:8px;top:8px;display:flex;flex-direction:column;gap:6px}
.mapzoom .iconbtn{width:32px;height:32px;font-size:1.1rem;border-radius:9px}
.mapwrap svg{cursor:grab;touch-action:none}
.mapwrap svg.grabbing{cursor:grabbing}
.mapwrap .disclaimer{position:absolute;right:10px;bottom:8px;font-size:.58rem;color:var(--sub);letter-spacing:.06em;text-transform:uppercase}
.corner-dot{cursor:pointer}
.corner-dot circle.halo{fill:transparent}
.corner-dot text{font-family:var(--mono);font-size:11px;font-weight:700;fill:#fff;pointer-events:none}
.maplegend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.maplegend span{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;color:var(--sub);font-weight:600}
.maplegend i{width:10px;height:10px;border-radius:50%;display:inline-block}

/* modal */
.modalback{position:fixed;inset:0;background:rgba(8,9,12,.62);z-index:90;backdrop-filter:blur(3px)}
.modal{
  position:fixed;left:0;right:0;bottom:0;z-index:95;max-width:640px;margin:0 auto;
  background:var(--bg);border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;
  max-height:88vh;overflow-y:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom));
  animation:slideup .22s ease;
}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.modal .grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 12px}
.modal h2{font-size:1.2rem;font-weight:850;margin-bottom:6px}

/* misc */
.empty{
  text-align:center;padding:34px 16px;color:var(--sub);
}
.empty .ico{font-size:2rem;margin-bottom:8px}
details.adv{margin:12px 0}
details.adv>summary{
  list-style:none;cursor:pointer;font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--accent);padding:8px 0;display:flex;align-items:center;gap:6px;
}
details.adv>summary::before{content:"▸";transition:transform .15s}
details.adv[open]>summary::before{transform:rotate(90deg)}
canvas.chart{width:100%;height:190px;display:block}
.legendrow{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;font-size:.7rem;color:var(--card-sub);font-weight:700}
.legendrow i{display:inline-block;width:14px;height:3px;border-radius:2px;vertical-align:middle;margin-right:4px}
.checkline{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--card2);font-size:.92rem}
.checkline:last-child{border-bottom:none}
.checkline input[type=checkbox]{width:21px;height:21px;accent-color:var(--accent);flex:none}
.checkline.done span{text-decoration:line-through;color:var(--card-sub)}
.notice{border-left:3px solid var(--accent);padding:8px 10px;background:var(--accent-soft);border-radius:0 10px 10px 0;font-size:.85rem;margin:8px 0}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + env(safe-area-inset-bottom));
  background:var(--ink);color:var(--bg);font-weight:700;font-size:.85rem;padding:10px 16px;border-radius:99px;
  z-index:120;box-shadow:0 6px 20px rgba(0,0,0,.35);animation:slideup .2s ease;max-width:88%;text-align:center;
}
.divider{height:1px;background:var(--card2);margin:10px 0}
.searchbox{position:relative;margin:8px 0}
.searchbox input{padding-left:38px}
.searchbox svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--sub)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.setuptable{width:100%;border-collapse:collapse;font-size:.82rem}
.setuptable td,.setuptable th{padding:6px 4px;border-bottom:1px solid var(--card2);text-align:left}
.setuptable th{font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--card-sub)}
.setuptable td.diff{background:var(--accent-soft);font-weight:800}
.ratingdots{display:flex;gap:3px}
.ratingdots i{width:8px;height:8px;border-radius:50%;background:var(--card2)}
.ratingdots i.on{background:var(--accent)}
</style>
</head>
<body data-theme="dark">
<div id="app"></div>
<nav class="tabs" id="tabs"></nav>
<div id="modals"></div>
<script>
"use strict";
/* ============================================================
   UTILITIES
============================================================ */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>{if(!iso)return"—";const d=new Date(iso+"T12:00");return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});};
const fmtDateShort=iso=>{if(!iso)return"—";const d=new Date(iso+"T12:00");return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});};
const yearOf=iso=>iso?iso.slice(0,4):"";
function mulberry(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

/* ---- lap time parsing & formatting ---- */
function parseLap(str){
  if(str==null)return null;
  let s=String(str).trim().toLowerCase().replace(/,/g,".").replace(/\s*(sec|seconds|s)$/,"").trim();
  if(!s)return null;
  let m;
  if(m=s.match(/^(\d+):(\d{1,2})[.:](\d{1,3})$/)){ // 1:58.420 or 1:58:42
    const min=+m[1],sec=+m[2],fr=+(m[3].padEnd(3,"0"));
    if(sec>=60)return null;
    return min*60000+sec*1000+fr;
  }
  if(m=s.match(/^(\d+):(\d{1,2})$/)){const min=+m[1],sec=+m[2];if(sec>=60)return null;return min*60000+sec*1000;}
  if(m=s.match(/^(\d+)[.](\d{1,3})$/)){return (+m[1])*1000+ +(m[2].padEnd(3,"0"));} // 118.420
  if(m=s.match(/^(\d+)$/)){const v=+m[1];return v<20?null:v*1000;}
  return null;
}
function fmtLap(ms,short){
  if(ms==null||isNaN(ms))return"—";
  const min=Math.floor(ms/60000),rest=ms-min*60000,sec=Math.floor(rest/1000),fr=Math.round(rest-sec*1000);
  const fs=String(fr).padStart(3,"0");
  return min>0? min+":"+String(sec).padStart(2,"0")+"."+(short?fs.slice(0,2):fs)
              : sec+"."+(short?fs.slice(0,2):fs);
}
function fmtDelta(ms){
  if(ms==null)return"";
  const sign=ms<0?"−":"+";const a=Math.abs(ms);
  return sign+(a/1000).toFixed(2);
}

/* ---- lap statistics ---- */
function validLaps(laps){return (laps||[]).filter(l=>!l.invalid&&!l.inlap&&!l.outlap&&l.ms>0);}
function lapStats(laps){
  const v=validLaps(laps).map(l=>l.ms);
  if(!v.length)return{n:0,best:null,avg:null,median:null,slowest:null,spread:null,std:null,consistency:null,trend:null};
  const best=Math.min(...v),slowest=Math.max(...v);
  const avg=v.reduce((a,b)=>a+b,0)/v.length;
  const sorted=[...v].sort((a,b)=>a-b);
  const median=sorted.length%2?sorted[(sorted.length-1)/2]:(sorted[sorted.length/2-1]+sorted[sorted.length/2])/2;
  const std=Math.sqrt(v.reduce((a,b)=>a+(b-avg)**2,0)/v.length);
  const consistency=clamp(Math.round(100-(std/best)*100*8),0,100); // 100 = metronome
  let trend=null;
  if(v.length>=4){
    const half=Math.floor(v.length/2);
    const a1=v.slice(0,half).reduce((a,b)=>a+b,0)/half;
    const a2=v.slice(-half).reduce((a,b)=>a+b,0)/half;
    trend=a2-a1;
  }
  return{n:v.length,best,avg,median,slowest,spread:slowest-best,std,consistency,trend};
}
function dayLaps(day){return (day.sessions||[]).flatMap(s=>s.laps||[]);}
function dayStats(day){return lapStats(dayLaps(day));}

/* ============================================================
   DB LAYER — IndexedDB with localStorage fallback
============================================================ */
const DB=(()=>{
  const NAME="apexbook",VER=1;let idb=null,ok=false;
  function open(){return new Promise(res=>{
    if(!("indexedDB" in window))return res(false);
    const rq=indexedDB.open(NAME,VER);
    rq.onupgradeneeded=e=>{const d=e.target.result;
      if(!d.objectStoreNames.contains("kv"))d.createObjectStore("kv");
      if(!d.objectStoreNames.contains("photos"))d.createObjectStore("photos");
    };
    rq.onsuccess=e=>{idb=e.target.result;ok=true;res(true);};
    rq.onerror=()=>res(false);
  });}
  function tx(store,mode,fn){return new Promise((res,rej)=>{
    const t=idb.transaction(store,mode),s=t.objectStore(store);const out=fn(s);
    t.oncomplete=()=>res(out&&out.result!==undefined?out.result:undefined);
    t.onerror=()=>rej(t.error);
  });}
  return{
    async init(){await open();},
    get ok(){return ok;},
    async getState(){
      if(ok){try{return await new Promise((res,rej)=>{const t=idb.transaction("kv");const r=t.objectStore("kv").get("state");r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}catch(e){}}
      try{const raw=localStorage.getItem("apexbook_state");return raw?JSON.parse(raw):null;}catch(e){return null;}
    },
    async setState(state){
      const json=JSON.stringify(state);
      if(ok){try{await tx("kv","readwrite",s=>s.put(state,"state"));return true;}catch(e){}}
      try{localStorage.setItem("apexbook_state",json);return true;}catch(e){return false;}
    },
    async putPhoto(id,dataUrl){
      if(ok){try{await tx("photos","readwrite",s=>s.put(dataUrl,id));return true;}catch(e){}}
      try{localStorage.setItem("apexbook_ph_"+id,dataUrl);return true;}catch(e){return false;}
    },
    async getPhoto(id){
      if(ok){try{return await new Promise((res,rej)=>{const t=idb.transaction("photos");const r=t.objectStore("photos").get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}catch(e){}}
      try{return localStorage.getItem("apexbook_ph_"+id);}catch(e){return null;}
    },
    async delPhoto(id){
      if(ok){try{await tx("photos","readwrite",s=>s.delete(id));}catch(e){}}
      try{localStorage.removeItem("apexbook_ph_"+id);}catch(e){}
    },
    async allPhotos(){
      if(ok){try{return await new Promise((res,rej)=>{const t=idb.transaction("photos");const s=t.objectStore("photos");const out={};const r=s.openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};r.onerror=()=>rej(r.error);});}catch(e){}}
      const out={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("apexbook_ph_"))out[k.slice(12)]=localStorage.getItem(k);}return out;
    }
  };
})();

/* photo cache for sync rendering */
const PhotoCache={};
async function loadPhotoInto(imgEl,id){
  if(PhotoCache[id]){imgEl.src=PhotoCache[id];return;}
  const d=await DB.getPhoto(id);
  if(d){PhotoCache[id]=d;imgEl.src=d;}
}
function photoImg(id,cls,cap){
  return `<span class="phwrap"><img class="${cls||"ph"}" data-photo="${id}" alt="${esc(cap||"photo")}">${cap?`<span class="cap">${esc(cap)}</span>`:""}</span>`;
}
function hydratePhotos(root){
  $$("img[data-photo]",root||document).forEach(img=>loadPhotoInto(img,img.dataset.photo));
}

function geoFor(circuitId,layoutId){
  const key=circuitId+"/"+layoutId;
  const imp=S.importedGeo&&S.importedGeo[key];
  if(imp)return Object.assign({},imp,{key});
  const g=CIRCUIT_GEO[key];
  if(!g)return null;
  const o=(S.geoOverrides||{})[key]||{};
  return Object.assign({},g,{key,sfShift:o.sfShift||0,t1:o.t1||1});
}
/* centripetal Catmull-Rom through the real vertices (interpolation only) */
function crSpline(P,per=3){
  const n=P.length,out=[];
  const d=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);
  for(let i=0;i<n;i++){
    const p0=P[(i-1+n)%n],p1=P[i],p2=P[(i+1)%n],p3=P[(i+2)%n];
    const t0=0,t1=t0+Math.sqrt(Math.max(d(p0,p1),1e-6)),t2=t1+Math.sqrt(Math.max(d(p1,p2),1e-6)),t3=t2+Math.sqrt(Math.max(d(p2,p3),1e-6));
    const k=Math.max(1,Math.round(d(p1,p2)/per));
    for(let s=0;s<k;s++){
      const t=t1+(t2-t1)*s/k;
      const L=(pa,pb,ta,tb)=>tb-ta<1e-9?pa:[pa[0]+(pb[0]-pa[0])*(t-ta)/(tb-ta),pa[1]+(pb[1]-pa[1])*(t-ta)/(tb-ta)];
      const A1=L(p0,p1,t0,t1),A2=L(p1,p2,t1,t2),A3=L(p2,p3,t2,t3);
      const B1=L(A1,A2,t0,t2),B2=L(A2,A3,t1,t3);
      out.push(L(B1,B2,t1,t2));
    }
  }
  return out;
}
function geoTransform(geo,W,H,pad){
  const S2=crSpline(geo.pts,4);
  let mnx=1/0,mxx=-1/0,mny=1/0,mxy=-1/0;
  for(const p of S2){mnx=Math.min(mnx,p[0]);mxx=Math.max(mxx,p[0]);mny=Math.min(mny,p[1]);mxy=Math.max(mxy,p[1]);}
  const sc=Math.min((W-2*pad)/(mxx-mnx),(H-2*pad)/(mxy-mny)); // aspect preserved
  const ox=(W-(mxx-mnx)*sc)/2, oy=(H-(mxy-mny)*sc)/2;
  const T=p=>[ox+(p[0]-mnx)*sc, H-oy-(p[1]-mny)*sc]; // y-flip: north up
  return{T,spline:S2,scale:sc};
}

function cornerChipRow(layout,anno){
  const n=clamp(layout.corners||12,1,30);

  for(let i=1;i<=n;i++){
    const ca=anno&&anno.corners[i];
    const st=ca&&ca.status?ca.status:"none";
    h+=`<button class="chip mini" style="${st!=="none"?`background:${STATUS_META[st].hex};border-color:${STATUS_META[st].hex};color:#fff`:""}" data-action="tapCorner" data-corner="${i}">T${i}</button>`;
  }

const WeatherService=(()=>{
  const mockProvider={
    name:"mock",
    async fetchHistorical(lat,lon,dateISO){
      await new Promise(r=>setTimeout(r,350)); // simulate network
      const rnd=mulberry(hashStr(dateISO+"|"+lat.toFixed(2)+lon.toFixed(2)));
      const month=+dateISO.slice(5,7);
      const seasonal=[4,5,8,12,16,19,22,22,18,13,8,5][month-1];
      const temp=Math.round((seasonal+ (rnd()*8-3))*10)/10;
      const rain=rnd()<(month>=10||month<=3?0.45:0.22)? Math.round(rnd()*6*10)/10 : 0;
      const wind=Math.round((6+rnd()*22)*10)/10;
      const dirs=["N","NE","E","SE","S","SW","W","NW"];
      const cloud=Math.round(rnd()*100);
      return{
        temp, feels:Math.round((temp-wind*0.12)*10)/10, rainMm:rain,
        windKmh:wind, windDir:dirs[Math.floor(rnd()*8)], humidity:Math.round(55+rnd()*40),
        cloud, summary: rain>0?"Showers":cloud>70?"Overcast":cloud>35?"Partly cloudy":"Sunny",
        source:"mock", fetchedAt:new Date().toISOString()
      };
    }
  };

    name:"Open-Meteo",
    async fetchHistorical(lat,lon,dateISO){
      const today=todayISO();
      const past=dateISO<today;
      const mk=(base,extra)=>`${base}?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation,relative_humidity_2m,cloud_cover,wind_speed_10m,wind_direction_10m&timezone=auto${extra}`;
      let j=null;
      const tryFetch=async url=>{const r=await fetch(url);if(!r.ok)throw new Error("weather api "+r.status);return r.json();};
      if(past){
        try{j=await tryFetch(mk("https://archive-api.open-meteo.com/v1/archive",`&start_date=${dateISO}&end_date=${dateISO}`));}
        catch(e){ // archive lags a few days behind — recent past comes from the forecast api
          j=await tryFetch(mk("https://api.open-meteo.com/v1/forecast","&past_days=10"));
        }
      }else{
        j=await tryFetch(mk("https://api.open-meteo.com/v1/forecast","&forecast_days=16"));

      const H=j.hourly;
      const idxs=H.time.map((t,i)=>t.startsWith(dateISO)?i:-1).filter(i=>i>=0);

      const day=idxs.filter(i=>{const h=+H.time[i].slice(11,13);return h>=9&&h<=18;});
      const use=day.length?day:idxs;

      const temp=Math.round(avg(g("temperature_2m",use))*10)/10;
      const feels=Math.round(avg(g("apparent_temperature",use))*10)/10;
      const rainMm=Math.round(g("precipitation",use).reduce((a,b)=>a+b,0)*10)/10;
      const windKmh=Math.round(Math.max(...g("wind_speed_10m",use))*10)/10;
      const windDir=compass(avg(g("wind_direction_10m",use)));
      const humidity=Math.round(avg(g("relative_humidity_2m",use)));
      const cloud=Math.round(avg(g("cloud_cover",use)));
      return{temp,feels,rainMm,windKmh,windDir,humidity,cloud,
        summary:rainMm>0.4?"Showers":cloud>70?"Overcast":cloud>35?"Partly cloudy":"Sunny",
        source:past?"Open-Meteo (measured)":"Open-Meteo (forecast)",fetchedAt:new Date().toISOString()};

function svgPhoto(label,bg,fg){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480"><rect width="640" height="480" fill="${bg}"/><path d="M-40 380 C 120 300 200 430 340 360 S 560 300 700 380" stroke="${fg}" stroke-width="26" fill="none" opacity=".5"/><path d="M-40 380 C 120 300 200 430 340 360 S 560 300 700 380" stroke="#fff" stroke-width="4" stroke-dasharray="14 18" fill="none" opacity=".6"/><text x="24" y="52" font-family="Arial" font-size="30" font-weight="bold" fill="#ffffffcc">${label}</text></svg>`;
  return"data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svg)));
}

function genLaps(seed,baseMs,count,{improve=0.6,noise=900,wet=false,out=true,inl=true}={}){
  const rnd=mulberry(seed);const laps=[];
  for(let i=0;i<count;i++){
    const prog=count>1?i/(count-1):0;
    let ms=baseMs-improve*1800*prog+(rnd()-0.5)*2*noise;
    if(wet)ms+=14000+rnd()*3000;
    const lap={id:uid(),ms:Math.round(ms)};
    if(out&&i===0)lap.outlap=true,lap.ms=Math.round(ms+16000);
    if(inl&&i===count-1)lap.inlap=true,lap.ms=Math.round(ms+11000);
    if(wet)lap.wet=true;
    laps.push(lap);
  }
  return laps;
}

/* ---- circuit helpers ---- */
function allCircuits(){
  const edited=BUILTIN_CIRCUITS.map(c=>{
    const e=S.circuitEdits[c.id];
    return e?Object.assign({},c,e,{layouts:(e.layouts||c.layouts)}):c;
  });
  return edited.concat(S.customCircuits);
}
function circuitById(id){return allCircuits().find(c=>c.id===id);}
function layoutOf(c,layoutId){return c?(c.layouts.find(l=>l.id===layoutId)||c.layouts[0]):null;}
function bikeById(id){return S.bikes.find(b=>b.id===id);}
function circuitLabel(day){
  const c=circuitById(day.circuitId);const l=layoutOf(c,day.layoutId);
  return c?c.name+(c.layouts.length>1&&l?` · ${l.name}`:""):"Unknown circuit";
}
function daysSorted(){return[...S.trackdays].sort((a,b)=>b.date.localeCompare(a.date));}
function daysFor(circuitId,layoutId,bikeId){
  return S.trackdays.filter(d=>d.circuitId===circuitId&&(!layoutId||d.layoutId===layoutId)&&(!bikeId||d.bikeId===bikeId));
}
function personalBest(circuitId,layoutId,bikeId,{dryOnly=false}={}){
  let best=null,bestDay=null;
  for(const d of daysFor(circuitId,layoutId,bikeId)){
    for(const s of d.sessions||[]){
      for(const l of validLaps(s.laps)){
        if(dryOnly&&(l.wet||["Wet","Damp"].includes(s.condition)))continue;
        if(best==null||l.ms<best){best=l.ms;bestDay=d;}
      }
    }
  }
  return best==null?null:{ms:best,day:bestDay};
}
function overallLatestPB(){
  let out=null;
  for(const d of daysSorted()){
    const st=dayStats(d);if(st.best==null)continue;
    const pb=personalBest(d.circuitId,d.layoutId,null);
    if(pb&&pb.day&&pb.day.id===d.id){out={ms:pb.ms,day:d};break;}
  }
  return out;
}
function annoKey(circuitId,layoutId,bikeId,dayId){
  return dayId?`${circuitId}/${layoutId}/${bikeId}/day/${dayId}`:`${circuitId}/${layoutId}/${bikeId}`;
}

/* ============================================================
   RIDER PATTERNS — the human across all your days
   Correlations in your own data. Patterns, not diagnoses.
============================================================ */
function riderPatterns(){
  const sess=[];
  for(const d of S.trackdays){
    const st=dayStats(d);
    (d.sessions||[]).forEach((s,i)=>{
      const ss=lapStats(s.laps);
      if(ss.n<3)return;
      sess.push({dayId:d.id,date:d.date,idx:i+1,start:s.start,cond:s.condition,
        cons:ss.consistency,best:ss.best,dayBest:st.best,
        conf:s.ratings&&s.ratings.confidence,fat:s.ratings&&s.ratings.physFatigue});
    });
  }
  const days=new Set(sess.map(s=>s.dayId)).size;
  const out=[];
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  if(days>=3){
    // 1. time of day
    const hr=s=>s.start?+s.start.split(":")[0]:null;
    const am=sess.filter(s=>hr(s)!=null&&hr(s)<13&&s.cons!=null).map(s=>s.cons);
    const pm=sess.filter(s=>hr(s)!=null&&hr(s)>=14&&s.cons!=null).map(s=>s.cons);
    if(am.length>=4&&pm.length>=4){
      const dlt=Math.round(avg(am)-avg(pm));
      if(Math.abs(dlt)>=4)out.push({icon:"🕐",t:`Your consistency after 14:00 runs ${Math.abs(dlt)} points ${dlt>0?"below":"above"} your mornings (${sess.filter(s=>hr(s)>=14).length} afternoon sessions across your diary).${dlt>0?" Heat, fatigue, or lunch — your data doesn't say which, but the pattern is real.":""}`});
    }
    // 2. late-session fade
    const early=sess.filter(s=>s.idx<=2&&s.cons!=null).map(s=>s.cons);
    const late=sess.filter(s=>s.idx>=4&&s.cons!=null).map(s=>s.cons);
    if(early.length>=4&&late.length>=3){
      const dlt=Math.round(avg(early)-avg(late));
      if(dlt>=4)out.push({icon:"🔋",t:`From session 4 onwards your consistency drops ${dlt} points on average. The fastest thing you can do late in a day may be a longer break — or ending on session 3's high.`});
      else if(dlt<=-3)out.push({icon:"🔋",t:`You get steadier as the day goes on (+${-dlt} consistency from session 4). Slow warm-up, strong finisher.`});
    }
    // 3. confidence <-> pace gap to day best
    const lo=sess.filter(s=>s.conf!=null&&s.conf<=5&&s.best&&s.dayBest).map(s=>(s.best-s.dayBest)/1000);
    const hi=sess.filter(s=>s.conf!=null&&s.conf>=7&&s.best&&s.dayBest).map(s=>(s.best-s.dayBest)/1000);
    if(lo.length>=3&&hi.length>=3){
      const dlt=avg(lo)-avg(hi);
      if(dlt>=0.7)out.push({icon:"🧠",t:`Sessions you rated confidence ≤5 sit ${dlt.toFixed(1)} s further from your day best than sessions rated ≥7. Correlation, not causation — but in your diary, trust and pace travel together.`});
    }
    // 4. physical fatigue signal
    const fatHi=sess.filter(s=>s.fat!=null&&s.fat>=6&&s.cons!=null).map(s=>s.cons);
    const fatLo=sess.filter(s=>s.fat!=null&&s.fat<=4&&s.cons!=null).map(s=>s.cons);
    if(fatHi.length>=3&&fatLo.length>=3){
      const dlt=Math.round(avg(fatLo)-avg(fatHi));
      if(dlt>=4)out.push({icon:"💪",t:`When you rate physical fatigue 6+, consistency is ${dlt} points lower. Arm pump and grip strength are trainable between track days.`});
    }
    // 5. first-session warm-up
    const warm=sess.filter(s=>s.idx===1&&s.best&&s.dayBest&&s.best>s.dayBest).map(s=>(s.best-s.dayBest)/1000);
    if(warm.length>=3){
      const w=avg(warm);
      if(w>=1)out.push({icon:"🌅",t:`Your first session runs ${w.toFixed(1)} s off your eventual day best on average. That's your warm-up cost — Track Memory's first-session priorities exist to shrink it.`});
    }
  }
  return{insights:out,days,sessions:sess.length};
}
function backupOverdue(){
  if(S.trackdays.length<2)return false;
  if(!S.lastBackupAt)return true;
  return (new Date(todayISO())-new Date(S.lastBackupAt))/864e5>30;
}
/* ---- maintenance status ---- */
function bikeTrackDayCount(bikeId,sinceDate){
  return S.trackdays.filter(d=>d.bikeId===bikeId&&(!sinceDate||d.date>=sinceDate)).length;
}
function bikeTrackKm(bikeId,sinceDate){
  let km=0;
  for(const d of S.trackdays){
    if(d.bikeId!==bikeId||(sinceDate&&d.date<sinceDate))continue;
    const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId);
    if(l)km+=validLaps(dayLaps(d)).length*l.lengthKm;
  }
  return Math.round(km);
}
function maintStatus(m,bikeId){
  bikeId=bikeId||"bike_r6";
  if(m.intervalType==="trackdays"){
    const used=bikeTrackDayCount(bikeId,m.lastDate);
    return{used,limit:m.interval,unit:"track days",due:used>=m.interval};
  }
  if(m.intervalType==="trackkm"){
    const used=bikeTrackKm(bikeId,m.lastDate);
    return{used,limit:m.interval,unit:"track km",due:used>=m.interval};
  }
  const days=Math.floor((Date.now()-new Date(m.lastDate||todayISO()))/864e5);
  return{used:days,limit:m.interval||365,unit:"days",due:days>=(m.interval||365)};
}

const pendingCharts=[];

function drawPendingCharts(root){
  while(pendingCharts.length){

function drawChart(cv,{type="line",series=[],labels=[],yFmt=v=>v,invertY=false}){
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||320,H=cv.clientHeight||190;
  cv.width=W*dpr;cv.height=H*dpr;
  const g=cv.getContext("2d");g.scale(dpr,dpr);
  const isCard=cv.closest(".card")&&!cv.closest(".card.dark");
  const axis=isCard?"#9a9b9e":"#565b66",grid=isCard?"rgba(0,0,0,.08)":"rgba(255,255,255,.08)",txt=isCard?"#5c5f66":"#9aa0ab";
  const padL=46,padR=8,padT=10,padB=22;
  const all=series.flatMap(s=>s.data.filter(v=>v!=null));
  if(!all.length){g.fillStyle=txt;g.font="12px sans-serif";g.fillText("No data yet",padL,H/2);return;}
  let mn=Math.min(...all),mx=Math.max(...all);
  if(mn===mx){mn-=1;mx+=1;}
  const span=mx-mn;mn-=span*0.08;mx+=span*0.08;
  const X=i=>padL+(labels.length<=1?0.5:(i/(labels.length-1)))*(W-padL-padR);
  const Y=v=>{const f=(v-mn)/(mx-mn);const ff=invertY?f:f;return padT+(1-ff)*(H-padT-padB);};
  // grid + y labels
  g.font="10px "+getComputedStyle(document.body).getPropertyValue("--mono");
  for(let i=0;i<=3;i++){
    const v=mn+(mx-mn)*i/3,y=Y(v);
    g.strokeStyle=grid;g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke();
    g.fillStyle=txt;g.textAlign="right";g.fillText(yFmt(v),padL-5,y+3);
  }
  // x labels (sparse)
  g.textAlign="center";
  const step=Math.max(1,Math.ceil(labels.length/5));
  labels.forEach((lb,i)=>{if(i%step===0||i===labels.length-1){g.fillStyle=txt;g.fillText(String(lb),X(i),H-6);}});
  for(const s of series){
    const col=s.color||"#ff521f";
    if(type==="bar"){
      const bw=Math.max(4,(W-padL-padR)/Math.max(labels.length,1)*0.55);
      s.data.forEach((v,i)=>{if(v==null)return;g.fillStyle=col;
        const y=Y(v);const y0=Y(mn+(0));
        g.beginPath();g.roundRect(X(i)-bw/2,y,bw,(H-padB)-y,3);g.fill();});
    }else{
      g.strokeStyle=col;g.lineWidth=2.2;g.lineJoin="round";g.beginPath();
      let started=false;
      s.data.forEach((v,i)=>{if(v==null){return;}const x=X(i),y=Y(v);
        if(!started){g.moveTo(x,y);started=true;}else g.lineTo(x,y);});
      g.stroke();
      s.data.forEach((v,i)=>{if(v==null)return;g.fillStyle=col;g.beginPath();g.arc(X(i),Y(v),3.2,0,7);g.fill();});
    }
  }
}

/* ============================================================
   TRACK MEMORY
============================================================ */
function trackMemory(circuitId,layoutId,bikeId){
  const visits=daysFor(circuitId,layoutId,bikeId).sort((a,b)=>a.date.localeCompare(b.date));
  if(!visits.length)return null;
  const last=visits[visits.length-1];
  const pb=personalBest(circuitId,layoutId,bikeId);
  const anno=S.annotations[annoKey(circuitId,layoutId,bikeId)]||{corners:{}};
  const strong=[],weak=[];
  for(const[num,c]of Object.entries(anno.corners||{})){
    const nm=c.name?`${c.name} (T${num})`:`Turn ${num}`;
    if(c.status==="strong")strong.push(nm);
    if(c.status==="attention"||c.status==="inconsistent")weak.push(nm);
  }
  const unresolved=[];
  for(const v of visits){
    if(v.nextPriorities)unresolved.push({date:v.date,text:v.nextPriorities});
    for(const g of v.goals||[])if(g.status==="not"||g.status==="deferred")unresolved.push({date:v.date,text:"Goal not met: "+g.text});
  }
  const setup=last.setup||{};
  const mistakes=visits.flatMap(v=>(v.sessions||[]).map(s=>s.debrief&&s.debrief.attention).filter(Boolean));
  const recs=[];
  if(unresolved.length)recs.push(unresolved[unresolved.length-1].text);
  if(weak.length)recs.push("Rebuild confidence in: "+weak.slice(0,2).join(", "));
  if(!recs.length&&pb)recs.push("Warm up to within 2 s of your best ("+fmtLap(pb.ms)+") before pushing.");
  return{visits,last,pb,strong,weak,unresolved:unresolved.slice(-3),setup,mistakes:mistakes.slice(-3),recs:recs.slice(0,2)};
}

      <span class="small" style="color:var(--red);font-weight:800">${st.used}/${st.limit} ${st.unit}</span></div>`).join("")}
  </div>`:""}
  `;
}

============================================================ */
function viewDiary(){
  if(route.dayId)return viewDayDetail(route.dayId);
  const days=daysSorted();
  let html=`<h1 class="page">Track-day diary</h1>${tracklineSVG()}
  <div class="btnrow"><button class="btn slim" data-action="newDay">＋ New track day</button>
  <button class="btn sec slim" data-action="newPlan">Plan ahead</button></div>`;
  if(!days.length)return html+`<div class="empty"><div class="ico">🏍️</div>Your diary is empty.<br>Start your first track day above.</div>`;
  const plans=[...S.plans].filter(p=>p.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date));
  if(plans.length){
    html+=`<div class="eyebrow" style="margin:14px 0 2px">Planned</div>`;
    for(const p of plans){const c=circuitById(p.circuitId);
      html+=`<div class="card dark flat tap" data-action="openPlan" data-id="${p.id}">
        <div class="row between"><b>${esc(c?c.name:"?")}</b><span class="small muted">${fmtDate(p.date)}</span></div>
        <div class="small muted">${esc(p.organiser||"Planned track day")}</div></div>`;}
  }
  html+=`<div class="tlwrap" style="margin-top:16px">`;
  let year="";
  for(const d of days){
    const y=yearOf(d.date);
    if(y!==year){year=y;html+=`<div class="yearmark">${y}</div>`;}
    const st=dayStats(d);
    const pb=personalBest(d.circuitId,d.layoutId,null);
    const isPB=pb&&pb.day&&pb.day.id===d.id;
    const photo=(d.photos&&d.photos[0]);
    html+=`<div class="tlitem card tap" data-action="openDay" data-id="${d.id}">
      <div class="row between">
        <div>
          <div class="row" style="gap:7px"><b style="font-size:1.02rem">${esc(circuitLabel(d))}</b>${d.active?'<span class="tag pb">Live</span>':""}</div>
          <div class="small muted">${fmtDate(d.date)} · ${esc(bikeById(d.bikeId)?.model||"")} · ${(d.sessions||[]).length} sessions</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.2rem">${weatherIcon(d.weather)}</div>
          ${condTag(d.condition)}
        </div>
      </div>
      <div class="row" style="margin-top:9px;gap:8px">
        ${photo?photoImg(photo.id,"ph"):""}
        <div style="flex:1">
          <div class="grid2" style="gap:7px">
            <div class="stat"><div class="k">Best ${isPB?'<span class="tag pb">PB</span>':""}</div><div class="v">${fmtLap(st.best,true)}</div></div>
            <div class="stat"><div class="k">Consistency</div><div class="v">${st.consistency??"—"}</div></div>
          </div>
        </div>
      </div>
      ${d.notes?`<div class="small muted" style="margin-top:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(d.notes)}</div>`:""}
    </div>`;
  }
  return html+`</div>`;
}
Actions.openDay=el=>go("diary",{dayId:el.dataset.id});
Actions.backDiary=()=>go("diary");

function ratingDots(v){
  if(v==null)return"";
  let h='<span class="ratingdots">';
  for(let i=1;i<=10;i++)h+=`<i class="${i<=v?"on":""}"></i>`;
  return h+"</span>";
}

function viewDayDetail(id){
  const d=S.trackdays.find(x=>x.id===id);
  if(!d)return viewDiary();
  const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId),bike=bikeById(d.bikeId);
  const st=dayStats(d);
  const pb=personalBest(d.circuitId,d.layoutId,null);
  const isPB=pb&&pb.day&&pb.day.id===d.id;
  const costSum=Object.values(d.costs||{}).reduce((a,b)=>a+(+b||0),0);
  const lapsN=validLaps(dayLaps(d)).length;
  const cur=S.settings.currency;

  let sessionsHTML="";
  (d.sessions||[]).forEach((s,si)=>{
    const ss=lapStats(s.laps);
    sessionsHTML+=`<div class="card tap" data-action="openSession" data-day="${d.id}" data-si="${si}">
      <div class="row between">
        <b>${esc(s.name||"Session "+(si+1))}</b>
        <span class="small muted">${esc(s.start||"")} ${condTag(s.condition)}</span>
      </div>
      <div class="grid3" style="margin-top:8px">
        <div class="stat"><div class="k">Best</div><div class="v">${fmtLap(ss.best,true)}</div></div>
        <div class="stat"><div class="k">Avg</div><div class="v">${fmtLap(ss.avg,true)}</div></div>
        <div class="stat"><div class="k">Cons.</div><div class="v">${ss.consistency??"—"}</div></div>
      </div>
      ${s.debrief&&s.debrief.focus?`<div class="small" style="margin-top:8px"><span class="tag" style="background:var(--accent);color:#fff">Focus</span> ${esc(s.debrief.focus)}</div>`:""}
      ${s.ratings&&s.ratings.confidence?`<div class="row between small muted" style="margin-top:6px"><span>Confidence</span>${ratingDots(s.ratings.confidence)}</div>`:""}
    </div>`;
  });

  // focus card for next session (from last debrief)
  const lastDeb=[...(d.sessions||[])].reverse().find(s=>s.debrief&&s.debrief.focus);
  const focusItems=[];
  if(lastDeb)focusItems.push(lastDeb.debrief.focus);
  const attn=[...(d.sessions||[])].reverse().find(s=>s.debrief&&s.debrief.attention);
  if(attn&&focusItems.length<2&&attn.debrief.attention!==focusItems[0])focusItems.push("Watch: "+attn.debrief.attention);

  const setup=d.setup||{};
  const setupRows=SETUP_FIELDS.filter(([k])=>setup[k]!==undefined&&setup[k]!=="").map(([k,label])=>
    `<tr><th>${esc(label)}</th><td class="laptime small">${esc(setup[k])}</td></tr>`).join("");

  return`
  <div class="row" style="margin-top:8px"><button class="iconbtn" data-action="backDiary">←</button>
    <div><h1 class="page" style="margin:0;font-size:1.25rem">${esc(c?c.name:"?")}</h1>
    <div class="small muted">${l&&c.layouts.length>1?esc(l.name)+" · ":""}${fmtDate(d.date)} · ${esc(bike?bike.brand+" "+bike.model:"")}</div></div>
  </div>

  <div class="card dark">
    <div class="row between">
      <div>
        <div class="eyebrow">${weatherIcon(d.weather)} ${esc(d.weather?d.weather.summary:"Weather")} ${d.weather?`· ${d.weather.temp}°C · ${d.weather.windKmh} km/h ${esc(d.weather.windDir||"")}`:""}</div>
        <div class="small muted" style="margin-top:2px">${esc(d.organiser||"")}</div>
      </div>
      <div>${condTag(d.condition)}</div>
    </div>
    ${!d.weather?`<button class="btn sec slim" style="margin-top:8px" data-action="fetchWeather" data-id="${d.id}">Fetch weather ${navigator.onLine?"":"(offline — will use mock)"}</button>`:""}
    <div class="grid3" style="margin-top:12px">
      <div class="stat"><div class="k">Best ${isPB?'<span class="tag pb">PB</span>':""}</div><div class="v">${fmtLap(st.best,true)}</div></div>
      <div class="stat"><div class="k">Average</div><div class="v">${fmtLap(st.avg,true)}</div></div>
      <div class="stat"><div class="k">Median</div><div class="v">${fmtLap(st.median,true)}</div></div>
      <div class="stat"><div class="k">Laps</div><div class="v">${st.n}</div></div>
      <div class="stat"><div class="k">Spread</div><div class="v">${st.spread!=null?(st.spread/1000).toFixed(2)+"s":"—"}</div></div>
      <div class="stat"><div class="k">Consistency</div><div class="v">${st.consistency??"—"}</div></div>
    </div>
  </div>

  ${d.active&&focusItems.length?`<div class="focuscard"><div class="eyebrow">Pit-lane focus · next session</div>
    <ul>${focusItems.slice(0,2).map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>`:""}

  <div class="cardhead" style="margin-top:16px"><h3 style="font-size:1rem;font-weight:850">Sessions</h3>
    <button class="linkish" data-action="quickSession" data-id="${d.id}">＋ Add session</button></div>
  ${sessionsHTML||`<div class="card"><div class="muted small">No sessions yet — add your first one.</div></div>`}

  ${(d.photos&&d.photos.length)?`
  <div class="cardhead" style="margin-top:14px"><h3 style="font-size:1rem;font-weight:850">Photos</h3>
    <button class="linkish" data-action="addDayPhoto" data-id="${d.id}">＋ Add</button></div>
  <div class="gallery">${d.photos.map((p,i)=>`<span data-action="viewPhoto" data-day="${d.id}" data-i="${i}">${photoImg(p.id,"","")}</span>`).join("")}</div>`
  :`<button class="btn sec" style="margin-top:10px" data-action="addDayPhoto" data-id="${d.id}">📷 Add photos</button>`}

  <div class="card" style="margin-top:14px">
    <div class="cardhead"><h3>Notes & reflection</h3><button class="linkish" data-action="editDayNotes" data-id="${d.id}">Edit</button></div>
    ${d.notes?`<div class="small" style="margin-bottom:8px">${esc(d.notes)}</div>`:'<div class="small muted">No general notes yet.</div>'}
    ${d.lessons?`<div class="notice"><b>Lessons learned:</b> ${esc(d.lessons)}</div>`:""}
    ${d.nextPriorities?`<div class="small" style="margin-top:6px"><span class="tag" style="background:var(--accent);color:#fff">Next visit</span> ${esc(d.nextPriorities)}</div>`:""}
  </div>

  ${(d.goals&&d.goals.length)?`<div class="card">
    <div class="cardhead"><h3>Goals</h3><button class="linkish" data-action="editGoals" data-id="${d.id}">Review</button></div>
    ${d.goals.map(g=>{
      const badge={achieved:["✓","var(--green)"],partial:["◐","var(--amber)"],not:["✗","var(--red)"],deferred:["→","var(--grey)"]}[g.status]||["·","var(--card-sub)"];
      return`<div class="row" style="padding:5px 0"><span style="color:${badge[1]};font-weight:900;width:18px">${badge[0]}</span><span class="small" style="font-weight:600">${esc(g.text)}</span></div>`;}).join("")}
  </div>`:`<button class="btn sec" data-action="editGoals" data-id="${d.id}">🎯 Set goals for this day</button>`}

  <details class="adv"><summary>Setup used</summary>
    <div class="card">${setupRows?`<table class="setuptable">${setupRows}</table>`:'<div class="small muted">No setup recorded.</div>'}
      <div class="btnrow"><button class="btn sec slim" data-action="editDaySetup" data-id="${d.id}">Edit setup</button>
      <button class="btn sec slim" data-action="saveAsPreset" data-id="${d.id}">Save as preset</button></div>
    </div>
  </details>

  <details class="adv"><summary>Costs ${costSum?`· ${cur}${costSum}`:""}</summary>
    <div class="card">
      ${COST_CATS.map(([k,label])=>`<div class="row between" style="padding:3px 0">
        <span class="small">${label}</span>
        <input type="number" inputmode="decimal" style="width:96px;text-align:right" class="mono" value="${d.costs&&d.costs[k]!=null?d.costs[k]:""}" data-change="setCost" data-id="${d.id}" data-k="${k}" placeholder="0">
      </div>`).join("")}
      <div class="row between" style="margin-top:8px;font-weight:800"><span>Total</span><span class="laptime">${cur}${costSum}</span></div>
      ${lapsN?`<div class="small muted" style="margin-top:2px">≈ ${cur}${(costSum/lapsN).toFixed(2)} per lap</div>`:""}
    </div>
  </details>

  <details class="adv"><summary>Incidents & issues ${d.incidents&&d.incidents.length?`· ${d.incidents.length}`:""}</summary>
    <div class="card">
      ${(d.incidents||[]).map((inc,i)=>`<div style="padding:6px 0;border-bottom:1px solid var(--card2)">${inc.corner?`<span class="tag grey">T${inc.corner}</span> `:""}
        <div class="row between"><span class="tag grey">${esc(inc.type)}</span>
        <button class="linkish" data-action="delIncident" data-id="${d.id}" data-i="${i}">Remove</button></div>
        <div class="small" style="margin-top:4px">${esc(inc.text)}</div></div>`).join("")||'<div class="small muted">Nothing logged. This log is private.</div>'}
      <button class="btn sec slim" style="margin-top:8px" data-action="addIncident" data-id="${d.id}">＋ Log incident or issue</button>
    </div>
  </details>

  <details class="adv"><summary>After-day checklist</summary>
    <div class="card">${POSTDAY_CHECK.map((item,i)=>{
      const done=(d.checkDone||[]).includes(i);
      return`<label class="checkline ${done?"done":""}"><input type="checkbox" ${done?"checked":""} data-change="postCheck" data-id="${d.id}" data-i="${i}"><span>${item}</span></label>`;}).join("")}
    </div>
  </details>

  <details class="adv"><summary>Track map & corner notes</summary>
    ${trackMapSVGForDayDetail(d)}
  </details>

  <div class="btnrow" style="margin-top:14px">
    ${d.active?`<button class="btn" data-action="finishDay" data-id="${d.id}">Finish track day</button>`
              :`<button class="btn sec" data-action="reopenDay" data-id="${d.id}">Reopen day</button>`}
    <button class="btn sec" data-action="editDayMeta" data-id="${d.id}">Edit details</button>
    <button class="btn sec" data-action="shareDay" data-id="${d.id}">📸 Share summary image</button>
  </div>
  <button class="btn danger" style="margin-top:2px" data-action="deleteDay" data-id="${d.id}">Delete track day</button>
  `;
}
function trackMapSVGForDayDetail(d){
  const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId);
  if(!c||!l)return"";
  mapCtx={circuitId:c.id,layoutId:l.id,bikeId:d.bikeId,dayId:null};
  const anno=S.annotations[annoKey(c.id,l.id,d.bikeId)];
  return geoMapSVG(c,l,anno,{mapId:"daymap"})+`
  <div class="maplegend">${Object.entries(STATUS_META).map(([k,m])=>`<span><i style="background:${m.hex}"></i>${m.label}</span>`).join("")}</div>
  <div class="small muted" style="margin:6px 2px">Tap a corner to review or edit your notes for this circuit + bike.</div>`;
}

Actions.chipPick=el=>{
  $$(`[data-group="${el.dataset.group}"]`,el.parentElement).forEach(x=>x.classList.remove("on"));
  el.classList.add("on");
};
function pickedChip(group,root){const el=$(`[data-group="${group}"].on`,root||document);return el?el.dataset.v:null;}

Actions.createDay=()=>{
  const day={id:uid(),circuitId:$("#f_circuit").value,layoutId:$("#f_layout").value,bikeId:$("#f_bike").value,
    date:$("#f_date").value||todayISO(),organiser:$("#f_org").value.trim(),condition:pickedChip("cond")||"Dry",
    sessions:[],setup:{},goals:[],photos:[],costs:{},incidents:[],checkDone:[],notes:"",lessons:"",nextPriorities:"",active:true};
  // carry setup from previous visit with same bike+circuit
  const prev=daysFor(day.circuitId,day.layoutId,day.bikeId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(prev&&prev.setup&&Object.keys(prev.setup).length){day.setup=Object.assign({},prev.setup);}
  S.trackdays.forEach(d=>d.active=false);
  S.trackdays.push(day);save();closeModal();
  toast(prev?"Created — setup copied from your last visit":"Track day created");
  go("diary",{dayId:day.id});
};

function lapListHTML(d,si){
  const s=d.sessions[si];
  const laps=s.laps||[];
  if(!laps.length)return`<div class="small muted" style="padding:8px 2px">No laps yet.</div>`;
  const v=validLaps(laps);const best=v.length?Math.min(...v.map(l=>l.ms)):null;
  const pbAll=personalBest(d.circuitId,d.layoutId,d.bikeId);
  const worst=v.length?Math.max(...v.map(l=>l.ms)):null;
  return laps.map((l,i)=>{
    const io=l.inlap||l.outlap;
    const delta=(best!=null&&!io&&!l.invalid)?l.ms-best:null;
    const barW=(best&&worst&&worst>best&&!io&&!l.invalid)?clamp(30+((worst-l.ms)/(worst-best))*70,20,100):0;
    return`<div class="laprow ${l.invalid?"invalid":""} ${io?"io":""}">
      <span class="n">${i+1}</span>
      <span class="t" data-action="lapMenu" data-day="${d.id}" data-si="${si}" data-li="${i}">${fmtLap(l.ms)}
        ${barW?`<div class="lapbar" style="width:${barW}%"></div>`:""}
      </span>
      <span class="flags">
        ${l.ms===best&&!io&&!l.invalid?'<span class="tag pb">PB?</span>'.replace("PB?",pbAll&&l.ms<=pbAll.ms?"PB":"best"):""}
        ${l.wet?'<span class="tag wet">wet</span>':""}
        ${l.outlap?'<span class="tag grey">out</span>':""}${l.inlap?'<span class="tag grey">in</span>':""}
        ${l.invalid?'<span class="tag grey">inv</span>':""}
        ${l.note?'<span class="tag grey">✎</span>':""}
      </span>
      <span class="d ${delta>0?"pos":delta===0?"neg":""}">${delta!=null&&delta>0?fmtDelta(delta):""}</span>
    </div>`;
  }).join("");
}
Actions.addLaps=el=>{
  const d=S.trackdays.find(x=>x.id===el.dataset.day);const si=+el.dataset.si;const s=d.sessions[si];
  const raw=$("#lapInput").value;
  const tokens=raw.split(/[\n;,\t]+|(?:\s{2,})/).map(t=>t.trim()).filter(Boolean);
  let added=0,bad=0;
  for(const t of tokens){
    const ms=parseLap(t);
    if(ms!=null&&ms>15000&&ms<1200000){s.laps.push({id:uid(),ms});added++;}
    else if(t)bad++;
  }
  $("#lapInput").value="";
  $("#lapList").innerHTML=lapListHTML(d,si);
  save();
  toast(added?`${added} lap${added>1?"s":""} added${bad?`, ${bad} not recognised`:""}`:"No valid lap times found");
};

function pickPhoto(cb){
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async()=>{
      // downscale for storage
      const img=new Image();
      img.onload=async()=>{
        const cv=document.createElement("canvas");
        const sc=Math.min(1,1280/Math.max(img.width,img.height));
        cv.width=img.width*sc;cv.height=img.height*sc;
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        const data=cv.toDataURL("image/jpeg",0.82);
        const id="ph_"+uid();
        await DB.putPhoto(id,data);PhotoCache[id]=data;
        cb(id);
      };
      img.src=r.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

}

  for(const[k,v]of Object.entries(S.annotations)){
    if(!k.startsWith(`${circuitId}/${layoutId}/${bikeId}/day/`))continue;
    const date=k.split("/day/")[1];
    const note=v.corners&&v.corners[num]&&v.corners[num].dayNote;
    if(note)items.push({date,note,key:k});
  }
  if(!items.length)return"";
  return`<div class="card dark flat"><div class="eyebrow" style="margin-bottom:4px">Earlier track-day observations</div>
    ${items.sort((a,b)=>b.date.localeCompare(a.date)).map(it=>`
    <div class="row between" style="padding:5px 0">
      <span class="small">${fmtDateShort(it.date)}: ${esc(it.note)}</span>
      <button class="linkish" data-action="promoteNote" data-key="${esc(it.key)}" data-corner="${num}">↑ Promote</button>
    </div>`).join("")}</div>`;
}
Actions.promoteNote=el=>{
  const src=S.annotations[el.dataset.key];const num=el.dataset.corner;
  const note=src.corners[num].dayNote;
  const perm=getAnno(annoKey(mapCtx.circuitId,mapCtx.layoutId,mapCtx.bikeId));
  const pc=perm.corners[num]||(perm.corners[num]={status:"none"});
  pc.notes=(pc.notes?pc.notes+"\n":"")+note;
  delete src.corners[num].dayNote;
  save();toast("Promoted to permanent notes");Actions.tapCorner({dataset:{corner:num}});
};

/* ============================================================
   CORNER JOURNEY — how a corner evolved across visits
============================================================ */
function cornerJourney(circuitId,layoutId,bikeId,num){
  const ev=[];
  const ca=(S.annotations[annoKey(circuitId,layoutId,bikeId)]||{corners:{}}).corners[num];
  if(ca&&ca.history)for(const h of ca.history)ev.push({d:h.d,type:"status",s:h.s});
  if(ca&&ca.confHistory)for(const h of ca.confHistory)ev.push({d:h.d,type:"conf",v:h.v});
  for(const day of S.trackdays){
    if(day.circuitId!==circuitId||day.layoutId!==layoutId)continue;
    for(const inc of(day.incidents||[]))if(inc.corner==num)ev.push({d:day.date,type:"incident",t:inc.type,text:inc.text});
  }
  const prefix=`${circuitId}/${layoutId}/${bikeId}/day/`;
  for(const k of Object.keys(S.annotations)){
    if(!k.startsWith(prefix))continue;
    const dn=S.annotations[k].corners&&S.annotations[k].corners[num]&&S.annotations[k].corners[num].dayNote;
    if(dn)ev.push({d:k.slice(prefix.length),type:"note",text:dn});
  }
  const ord={incident:0,status:1,conf:2,note:3};ev.sort((a,b)=>a.d.localeCompare(b.d)||ord[a.type]-ord[b.type]);
  return ev;
}
function journeyHTML(circuitId,layoutId,bikeId,num){

  if(ca&&ca.confHistory)for(const h of ca.confHistory)ev.push({d:h.d,type:"conf",v:h.v});
  for(const day of S.trackdays){
    if(day.circuitId!==circuitId||day.layoutId!==layoutId)continue;
    for(const inc of(day.incidents||[]))if(inc.corner==num)ev.push({d:day.date,type:"incident",t:inc.type,text:inc.text});
  }
  const prefix=`${circuitId}/${layoutId}/${bikeId}/day/`;
  for(const k of Object.keys(S.annotations)){
    if(!k.startsWith(prefix))continue;
    const dn=S.annotations[k].corners&&S.annotations[k].corners[num]&&S.annotations[k].corners[num].dayNote;
    if(dn)ev.push({d:k.slice(prefix.length),type:"note",text:dn,key:k});

/* ============================================================
   FEAR LEDGER — confidence recovery after incidents, per corner
============================================================ */
function fearLedger(circuitId,layoutId,bikeId){
  const anno=S.annotations[annoKey(circuitId,layoutId,bikeId)];
  const out=[];
  for(const day of S.trackdays){
    if(day.circuitId!==circuitId||day.layoutId!==layoutId)continue;
    for(const inc of(day.incidents||[])){
      if(!inc.corner)continue;
      const ca=anno&&anno.corners[inc.corner];
      const hist=(ca&&ca.confHistory)||[];
      const before=hist.filter(h=>h.d<day.date).map(h=>h.v).pop()??null;
      const after=hist.filter(h=>h.d>=day.date).map(h=>h.v).pop()??(ca?ca.confidence:null);
      out.push({corner:inc.corner,name:ca&&ca.name,type:inc.type,date:day.date,before,after,
        recovered:before==null||after==null?null:after>=before});
    }
  }
  return out;
}
function fearLedgerCard(circuitId,layoutId,bikeId){
  const led=fearLedger(circuitId,layoutId,bikeId);
  if(!led.length)return"";
  const row=e=>{
    const label=`T${e.corner}${e.name?" · "+esc(e.name):""}`;
    let verdict="";
    if(e.recovered===false)verdict=`<div class="small" style="color:var(--amber)">Confidence ${e.before} before → ${e.after} now. Not back yet — that's normal. Rebuild this corner gradually; speed follows trust.</div>`;
    else if(e.recovered===true)verdict=`<div class="small" style="color:var(--green)">Confidence back to ${e.after} (was ${e.before} before) — recovered. ✓</div>`;
    else verdict=`<div class="small muted">Track confidence here over your next visits to see the recovery arc.</div>`;
    return`<div style="padding:7px 0;border-bottom:1px solid var(--card2)">
      <div class="row between"><b class="small">${label}</b><span class="small muted">${esc(e.type)} · ${fmtDateShort(e.date)}</span></div>
      ${verdict}</div>`;
  };
  return`<div class="card"><div class="eyebrow acc" style="margin-bottom:6px">Confidence ledger</div>
    <div class="small muted" style="margin-bottom:6px">Incidents leave a mark that lap times don't show. This is yours, privately.</div>
    ${led.map(row).join("")}</div>`;
}
Actions.saveCorner=el=>{
  const num=el.dataset.corner;
  const anno=getAnno(annoKey(mapCtx.circuitId,mapCtx.layoutId,mapCtx.bikeId));
  const ca=anno.corners[num]||(anno.corners[num]={});
  const newSt=pickedChip("cst")||ca.status||"none";
  if(newSt!==ca.status&&newSt!=="none"){
    ca.history=ca.history||[];
    const last=ca.history[ca.history.length-1];
    if(!last||last.s!==newSt)ca.history.push({d:todayISO(),s:newSt});
  }
  ca.status=newSt;
  for(const k of["name","gear","speed","braking","turnin","apex","exit","throttle","body","refs","instruction"]){
    const inp=$("#co_"+k);if(inp)ca[k]=inp.value.trim();
  }
  ca.notes=$("#co_notes").value.trim();
  const newConf=+$("#co_conf").value;
  if(newConf!==ca.confidence){
    ca.confHistory=ca.confHistory||[];
    const lastC=ca.confHistory[ca.confHistory.length-1];
    if(!lastC||lastC.d!==todayISO())ca.confHistory.push({d:todayISO(),v:newConf});
    else lastC.v=newConf;
  }
  ca.confidence=newConf;
  const dn=$("#co_daynote").value.trim();
  if(dn){
    const dkey=`${mapCtx.circuitId}/${mapCtx.layoutId}/${mapCtx.bikeId}/day/${todayISO()}`;
    const da=getAnno(dkey);
    da.corners[num]=da.corners[num]||{};
    da.corners[num].dayNote=dn;
  }
  save();closeModal();render();
};

/* ============================================================
   TYRE SETS — per-bike registry with auto usage stats
============================================================ */
function tyreSetsFor(bikeId){return (S.tyreSets||[]).filter(t=>t.bikeId===bikeId);}
function tyreStats(setId){
  const days=S.trackdays.filter(d=>d.tyreSetId===setId);
  let km=0,cycles=0;
  for(const d of days){
    const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId);
    const laps=validLaps(dayLaps(d)).length+((dayLaps(d).length-validLaps(dayLaps(d)).length));
    km+=Math.round((l?l.lengthKm:4)*dayLaps(d).length);
    cycles+=(d.sessions||[]).length;
  }
  return{days:days.length,km,cycles};
}
function tyreSetsCard(bikeId){
  const sets=tyreSetsFor(bikeId);
  const row=t=>{
    const st=tyreStats(t.id);
    return`<div class="row between" style="padding:7px 0;border-bottom:1px solid var(--card2)">
      <div style="min-width:0"><b class="small">${esc(t.label)}</b> <span class="tag ${t.retired?"grey":"dry"}">${t.retired?"retired":esc(t.type)}</span>
        <div class="small muted">${t.mounted?fmtDate(t.mounted)+" · ":""}${st.days} days · ${st.km} km · ${st.cycles} heat cycles</div></div>
      <div class="row" style="gap:4px">

        <button class="linkish" data-action="delTyre" data-t="${t.id}">✕</button>
      </div></div>`;
  };
  return`<div class="card"><div class="cardhead"><h3 style="font-weight:850;font-size:1rem">Tyre sets</h3>
      <button class="linkish" data-action="addTyre" data-bike="${bikeId}">＋ Add set</button></div>
    ${sets.map(row).join("")||'<div class="small muted">Track a set to see km and heat cycles build up automatically from your diary.</div>'}
  </div>`;
}

/* ============================================================
   GPS SESSION IMPORT (GPX with timestamps)
   Lap detection at the S/F line + per-corner minimum speeds
   against the real circuit geometry. No timing hardware needed.
============================================================ */
function parseGpxTimed(text){
  const doc=new DOMParser().parseFromString(text,"text/xml");
  const pts=[...doc.querySelectorAll("trkpt")].map(p=>{
    const t=p.querySelector("time");
    return{lat:+p.getAttribute("lat"),lon:+p.getAttribute("lon"),t:t?Date.parse(t.textContent):NaN};
  }).filter(p=>isFinite(p.lat)&&isFinite(p.lon)&&isFinite(p.t));
  if(pts.length<50)throw new Error("need a GPX track with timestamps (found "+pts.length+" timed points)");
  return pts;
}
function gpsToLocal(pts,origin){
  const kx=111320*Math.cos(origin[0]*Math.PI/180),ky=110574;
  return pts.map(p=>({x:(p.lon-origin[1])*kx,y:(p.lat-origin[0])*ky,t:p.t}));
}
function gpsSpeeds(L){ // km/h, 3-sample smoothed
  const v=[0];
  for(let i=1;i<L.length;i++){
    const dt=(L[i].t-L[i-1].t)/1000;
    v.push(dt>0?Math.hypot(L[i].x-L[i-1].x,L[i].y-L[i-1].y)/dt*3.6:v[i-1]);
  }
  return v.map((_,i)=>{
    const a=v[Math.max(0,i-1)],b=v[i],c=v[Math.min(v.length-1,i+1)];
    return Math.round((a+b+c)/3*10)/10;
  });
}
function detectLaps(L,sf,sfHeading){
  // crossing = enter 30 m of S/F moving roughly in track direction; min lap 40 s
  const laps=[];let lastT=-1;
  for(let i=1;i<L.length;i++){
    const d=Math.hypot(L[i].x-sf[0],L[i].y-sf[1]);
    if(d>30)continue;
    const hd=Math.atan2(L[i].y-L[i-1].y,L[i].x-L[i-1].x);
    let dh=hd-sfHeading;while(dh>Math.PI)dh-=2*Math.PI;while(dh<-Math.PI)dh+=2*Math.PI;
    if(Math.abs(dh)>Math.PI/2)continue;
    // closest approach within this pass: skip forward while distance shrinks
    let j=i;
    while(j+1<L.length&&Math.hypot(L[j+1].x-sf[0],L[j+1].y-sf[1])<Math.hypot(L[j].x-sf[0],L[j].y-sf[1]))j++;
    const t=L[j].t;
    if(lastT<0||t-lastT>40000){
      if(lastT>=0)laps.push({startT:lastT,endT:t,ms:t-lastT,startIdx:null,endIdx:j});
      lastT=t;
    }
    i=j+5;
  }
  // attach start indices
  let k=0;
  for(const lp of laps){
    while(k<L.length&&L[k].t<lp.startT)k++;
    lp.startIdx=k;
  }
  return laps;
}
function cornerMinSpeeds(L,v,lap,geo){
  const cs=geoNumberedCorners(geo);
  const seg=[];for(let i=lap.startIdx;i<=lap.endIdx;i++)seg.push(i);
  return cs.map(c=>{
    let vmin=1/0;
    for(const i of seg){
      if(Math.hypot(L[i].x-c.x,L[i].y-c.y)<70&&v[i]>3)vmin=Math.min(vmin,v[i]);
    }
    return{n:c.n,vmin:isFinite(vmin)?Math.round(vmin):null};
  });
}
Actions.importGPS=el=>{
  const dayId=el.dataset.day,si=+el.dataset.si;
  const inp=document.createElement("input");inp.type="file";inp.accept=".gpx";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{handleGpsImport(dayId,si,f.name,String(r.result));}catch(e){toast("GPS import failed: "+e.message);}};
    r.readAsText(f);
  };
  inp.click();
};
function handleGpsImport(dayId,si,fname,text){
  const d=S.trackdays.find(x=>x.id===dayId);
  const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId);
  const geo=geoFor(c.id,l.id);
  const pts=parseGpxTimed(text);
  if(!geo||!geo.origin){
    toast("This layout has no georeferenced map — import a lat/lon map first, then GPS analysis works here too.");
    return;
  }
  const L=gpsToLocal(pts,geo.origin);
  // sanity: trace must actually be at this circuit
  const cx=L.reduce((a,p)=>a+p.x,0)/L.length,cy=L.reduce((a,p)=>a+p.y,0)/L.length;
  if(Math.hypot(cx,cy)>3000)throw new Error("this recording doesn't look like it's at "+c.name);
  const spline=crSpline(geo.pts,4);
  const sf=[spline[0][0],spline[0][1]];
  const sfHeading=Math.atan2(spline[3][1]-spline[0][1],spline[3][0]-spline[0][0]);
  const v=gpsSpeeds(L);
  const laps=detectLaps(L,sf,sfHeading);
  if(!laps.length)throw new Error("no complete laps found — does the recording cross the start/finish?");
  // per-corner speeds for the fastest lap + field median
  const best=laps.reduce((a,b)=>b.ms<a.ms?b:a);
  const bestCorners=cornerMinSpeeds(L,v,best,geo);
  const perLap=laps.map(lp=>cornerMinSpeeds(L,v,lp,geo));
  const med=n=>{const vals=perLap.map(pl=>pl.find(x=>x.n===n)?.vmin).filter(x=>x!=null).sort((a,b)=>a-b);return vals.length?vals[Math.floor(vals.length/2)]:null;};
  window.__gpsPending={dayId,si,laps,bestCorners:bestCorners.map(bc=>({n:bc.n,vmin:bc.vmin,med:med(bc.n)})),fname,bestMs:best.ms};
  const rows=laps.map((lp,i)=>`<div class="row between" style="padding:5px 0;border-bottom:1px solid var(--card2)">
    <label class="row" style="gap:8px"><input type="checkbox" class="gpslap" data-i="${i}" checked>
    <span class="small">Lap ${i+1}</span></label>
    <span class="laptime">${fmtLap(lp.ms)}${lp.ms===best.ms?' <span class="tag pb">fastest</span>':""}</span></div>`).join("");
  openModal(`<h2>GPS session · ${esc(fname)}</h2>
    <div class="small muted">${laps.length} laps detected at the ${esc(c.name)} start/finish line. GPS timing is ±0.3–0.5 s — treat these as training numbers, not transponder times.</div>
    <div class="card dark flat" style="margin-top:8px">${rows}</div>
    <button class="btn" data-action="addGpsLaps">Add selected laps to session</button>
    <div class="cardhead" style="margin-top:12px"><h3 style="font-weight:850;font-size:1rem">Corner speeds — fastest lap</h3></div>
    <div class="card dark flat">${window.__gpsPending.bestCorners.map(bc=>{
      const diff=bc.vmin!=null&&bc.med!=null?bc.vmin-bc.med:null;
      return`<div class="row between" style="padding:4px 0"><span class="small">T${bc.n}</span>
        <span class="laptime">${bc.vmin!=null?bc.vmin+" km/h":"—"}
        ${diff!=null&&Math.abs(diff)>=3?`<span class="small" style="color:${diff>0?"var(--green)":"var(--amber)"}">${diff>0?"+":""}${diff} vs your median</span>`:""}</span></div>`;}).join("")}
    </div>
    <div class="small muted" style="margin-top:6px">Corners where your fastest lap barely beats your median are where consistency already lives — the big negative gaps are where the time is.</div>
    <button class="btn sec slim" style="margin-top:8px" data-action="saveGpsAnalysis">Save analysis with this session</button>`);
}
Actions.addGpsLaps=()=>{
  const g=window.__gpsPending;if(!g)return;
  const d=S.trackdays.find(x=>x.id===g.dayId);const s=d.sessions[g.si];
  const chosen=[...document.querySelectorAll(".gpslap:checked")].map(x=>+x.dataset.i);
  let added=0;
  for(const i of chosen){s.laps.push({ms:g.laps[i].ms,gps:true});added++;}
  save();toast(added+" GPS laps added to "+s.name);
  closeModal();openSessionModal(g.dayId,g.si);
};
Actions.saveGpsAnalysis=()=>{
  const g=window.__gpsPending;if(!g)return;
  const d=S.trackdays.find(x=>x.id===g.dayId);const s=d.sessions[g.si];
  s.gpsAnalysis={fname:g.fname,bestMs:g.bestMs,corners:g.bestCorners,at:new Date().toISOString()};
  save();toast("Analysis saved");closeModal();openSessionModal(g.dayId,g.si);
};

/* ============================================================
   MAP ZOOM & PAN (viewBox based), ADJUST TOOLS, IMPORT SYSTEM
============================================================ */
const MapView={};  // mapId -> {x,y,w,h,base:[x,y,w,h]}
function mapSvgOf(el){return el.closest(".mapwrap").querySelector("svg");}
function vbOf(svg){return svg.getAttribute("viewBox").split(" ").map(Number);}
function setVb(svg,vb){svg.setAttribute("viewBox",vb.map(n=>n.toFixed(2)).join(" "));}
Actions.mapZoom=el=>{
  const svg=mapSvgOf(el);
  const vb=vbOf(svg),base=svg.dataset.vb.split(" ").map(Number);
  const f=el.dataset.z==="in"?0.62:1/0.62;
  let w=clamp(vb[2]*f,base[2]*0.12,base[2]),h=clamp(vb[3]*f,base[3]*0.12,base[3]);
  let x=vb[0]+(vb[2]-w)/2,y=vb[1]+(vb[3]-h)/2;
  x=clamp(x,base[0],base[0]+base[2]-w);y=clamp(y,base[1],base[1]+base[3]-h);
  setVb(svg,[x,y,w,h]);
};
(function mapPanPinch(){
  let svg=null,ptrs=new Map(),start=null,pinch0=null,moved=false;
  document.addEventListener("pointerdown",e=>{
    const s=e.target.closest(".mapwrap svg");if(!s)return;
    svg=s;ptrs.set(e.pointerId,[e.clientX,e.clientY]);moved=false;
    if(ptrs.size===1)start={vb:vbOf(svg),px:e.clientX,py:e.clientY};
    if(ptrs.size===2){
      const[a,b]=[...ptrs.values()];
      pinch0={d:Math.hypot(a[0]-b[0],a[1]-b[1]),vb:vbOf(svg)};
    }
  });
  document.addEventListener("pointermove",e=>{
    if(!svg||!ptrs.has(e.pointerId))return;
    ptrs.set(e.pointerId,[e.clientX,e.clientY]);
    const base=svg.dataset.vb.split(" ").map(Number);
    const r=svg.getBoundingClientRect();
    if(ptrs.size===1&&start){
      const vb=start.vb.slice();
      const zoomedIn=vb[2]<base[2]*0.98;
      const dx=(e.clientX-start.px)*vb[2]/r.width,dy=(e.clientY-start.py)*vb[3]/r.height;
      if(Math.hypot(e.clientX-start.px,e.clientY-start.py)>6)moved=true;
      if(!zoomedIn)return;         // don't hijack page scroll when not zoomed
      e.preventDefault();
      vb[0]=clamp(vb[0]-dx,base[0],base[0]+base[2]-vb[2]);
      vb[1]=clamp(vb[1]-dy,base[1],base[1]+base[3]-vb[3]);
      setVb(svg,vb);svg.classList.add("grabbing");
    }else if(ptrs.size===2&&pinch0){
      e.preventDefault();
      const[a,b]=[...ptrs.values()];
      const d=Math.hypot(a[0]-b[0],a[1]-b[1]);
      const f=clamp(pinch0.d/d,0.2,5);
      const vb=pinch0.vb.slice();
      let w=clamp(vb[2]*f,base[2]*0.12,base[2]),h=clamp(vb[3]*f,base[3]*0.12,base[3]);
      let x=vb[0]+(vb[2]-w)/2,y=vb[1]+(vb[3]-h)/2;
      x=clamp(x,base[0],base[0]+base[2]-w);y=clamp(y,base[1],base[1]+base[3]-h);
      setVb(svg,[x,y,w,h]);
    }

let fixMode=null; // {type:"sf"|"t1",c,l}

function armFixTap(){
  const svg=$("#fixMapHolder svg");if(!svg)return;
  svg.style.cursor="crosshair";
  svg.onclick=e=>{
    if(!fixMode)return;
    const c=circuitById(fixMode.c),l=layoutOf(c,fixMode.l);
    const key=c.id+"/"+l.id;
    const geo=geoFor(c.id,l.id);
    const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
    const loc=pt.matrixTransform(svg.getScreenCTM().inverse());
    const{T}=geoTransform(geo,320,250,20);
    if(fixMode.type==="t1"){
      // nearest corner
      const cs=geo.corners||[];
      if(!cs.length)return;
      let bi=0,bd=1e9;
      cs.forEach((cc,i)=>{const p=T([cc.x,cc.y]);const d=Math.hypot(p[0]-loc.x,p[1]-loc.y);if(d<bd){bd=d;bi=i;}});
      if(S.importedGeo&&S.importedGeo[key]){S.importedGeo[key].t1=bi+1;}
      else{S.geoOverrides=S.geoOverrides||{};S.geoOverrides[key]=Object.assign(S.geoOverrides[key]||{},{t1:bi+1});}
      toast("Turn 1 set — corners renumbered");
    }else{
      // nearest raw vertex → rotate pts so it becomes index 0; corners keep coords (renumber via t1 unchanged rel order)
      let bi=0,bd=1e9;
      geo.pts.forEach((p,i)=>{const q=T(p);const d=Math.hypot(q[0]-loc.x,q[1]-loc.y);if(d<bd){bd=d;bi=i;}});
      const rotated=geo.pts.slice(bi).concat(geo.pts.slice(0,bi));
      const entry={pts:rotated,dir:geo.dir,corners:geo.corners,lengthM:geo.lengthM,officialM:geo.officialM,
        source:geo.source,sfNote:"start/finish set by rider on map",sfApprox:false,verified:geo.verified,
        cornerSource:geo.cornerSource,t1:geo.t1||1};
      // resort corners by position along new loop so numbering restarts from new S/F
      const spl=crSpline(rotated,5);
      const arc=p=>{let best=0,bd2=1e9;for(let i=0;i<spl.length;i+=2){const d=Math.hypot(spl[i][0]-p[0],spl[i][1]-p[1]);if(d<bd2){bd2=d;best=i;}}return best;};
      entry.corners=[...geo.corners].sort((a,b)=>arc([a.x,a.y])-arc([b.x,b.y])).map((cc,i)=>({n:i+1,x:cc.x,y:cc.y}));
      S.importedGeo=S.importedGeo||{};
      S.importedGeo[key]=entry;
      toast("Start/finish updated");
    }
    save();fixMode=null;svg.onclick=null;
    Actions.fixMap({dataset:{c:c.id,l:l.id}});
  };
}
