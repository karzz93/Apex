function parseLatLonTrack(name,text){
  const ext=name.toLowerCase().split(".").pop();
  if(ext==="geojson"||ext==="json"){
    const j=JSON.parse(text);
    const geoms=[];
    const walk=o=>{
      if(!o)return;
      if(o.type==="FeatureCollection")(o.features||[]).forEach(f=>walk(f));
      else if(o.type==="Feature")walk(o.geometry);
      else if(o.type==="LineString")geoms.push(o.coordinates);
      else if(o.type==="MultiLineString")o.coordinates.forEach(cc=>geoms.push(cc));
      else if(o.type==="Polygon")geoms.push(o.coordinates[0]);
    };
    walk(j);
    if(!geoms.length)throw new Error("no LineString found in GeoJSON");
    const coords=geoms.sort((a,b)=>b.length-a.length)[0];
    return{lonlat:coords.map(c=>[c[0],c[1]])};
  }
  if(ext==="gpx"){
    const doc=new DOMParser().parseFromString(text,"text/xml");
    let pts=[...doc.querySelectorAll("trkpt")];
    if(!pts.length)pts=[...doc.querySelectorAll("rtept")];
    if(!pts.length)throw new Error("no track points in GPX");
    return{lonlat:pts.map(p=>[+p.getAttribute("lon"),+p.getAttribute("lat")])};
  }
  if(ext==="kml"){
    const doc=new DOMParser().parseFromString(text,"text/xml");
    const cs=[...doc.getElementsByTagName("coordinates")];
    if(!cs.length)throw new Error("no coordinates in KML");
    const best=cs.map(c=>c.textContent.trim().split(/\s+/)).sort((a,b)=>b.length-a.length)[0];
    return{lonlat:best.map(t=>{const[lon,lat]=t.split(",").map(Number);return[lon,lat];}).filter(p=>isFinite(p[0])&&isFinite(p[1]))};
  }
  if(ext==="svg"){
    const doc=new DOMParser().parseFromString(text,"image/svg+xml");
    const path=doc.querySelector("path[d]");
    const poly=doc.querySelector("polyline[points],polygon[points]");
    let xy;
    if(path){
      // sample via live SVG path element
      const tmp=document.createElementNS("http://www.w3.org/2000/svg","svg");
      tmp.style.cssText="position:absolute;left:-9999px;width:10px;height:10px";
      const pe=document.createElementNS("http://www.w3.org/2000/svg","path");
      pe.setAttribute("d",path.getAttribute("d"));
      tmp.appendChild(pe);document.body.appendChild(tmp);
      const L=pe.getTotalLength();
      const N=Math.min(800,Math.max(200,Math.round(L/2)));
      xy=[];
      for(let i=0;i<N;i++){const p=pe.getPointAtLength(L*i/N);xy.push([p.x,-p.y]);}
      tmp.remove();
    }else if(poly){
      const nums=poly.getAttribute("points").trim().split(/[\s,]+/).map(Number);
      xy=[];for(let i=0;i+1<nums.length;i+=2)xy.push([nums[i],-nums[i+1]]);
    }else throw new Error("no <path> or <polyline> in SVG");
    return{xy,svg:true};
  }
  throw new Error("unsupported file type ."+ext);
}
function handleGeoImport(circuitId,layoutId,fname,text){
  const parsed=parseLatLonTrack(fname,text);
  let P;
  if(parsed.xy){P=parsed.xy;}
  else{
    const ll=parsed.lonlat;
    if(ll.length<20)throw new Error("track too short ("+ll.length+" points)");
    const lat0=ll.reduce((a,c)=>a+c[1],0)/ll.length,lon0=ll.reduce((a,c)=>a+c[0],0)/ll.length;
    const kx=111320*Math.cos(lat0*Math.PI/180),ky=110574;
    P=ll.map(c=>[(c[0]-lon0)*kx,(c[1]-lat0)*ky]);
    window.__importOrigin=[Math.round(lat0*1e6)/1e6,Math.round(lon0*1e6)/1e6];
  }
  // dedupe
  const d=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);
  const Q=[P[0]];
  for(const p of P.slice(1))if(d(Q[Q.length-1],p)>1)Q.push(p);
  while(Q.length>2&&d(Q[0],Q[Q.length-1])<40)Q.pop();
  if(Q.length<20)throw new Error("not enough distinct points");
  const gap=d(Q[0],Q[Q.length-1]);
  let lengthM=0;for(let i=0;i<Q.length;i++)lengthM+=d(Q[i],Q[(i+1)%Q.length]);
  // for a lap recording (GPS), the endpoints should nearly meet
  const c=circuitById(circuitId),l=layoutOf(c,layoutId);
  const scaleNote=parsed.svg?"SVG units — scaled to official length":"";
  if(parsed.svg&&l&&l.lengthKm){const f=l.lengthKm*1000/lengthM;for(const p of Q){p[0]*=f;p[1]*=f;}lengthM*=f;}
  showImportPreview(circuitId,layoutId,fname,Q,Math.round(lengthM),gap,scaleNote);
}
function showImportPreview(circuitId,layoutId,fname,Q,lengthM,gap,scaleNote){
  const c=circuitById(circuitId),l=layoutOf(c,layoutId);
  const off=l?l.lengthKm*1000:null;
  const err=off?Math.abs(lengthM-off)/off:null;
  const tmpGeo={pts:Q.map(p=>[Math.round(p[0]*10)/10,Math.round(p[1]*10)/10]),corners:[]};
  const{T,spline}=geoTransform(tmpGeo,300,220,16);
  const path="M "+spline.map(p=>{const q=T(p);return q[0].toFixed(1)+" "+q[1].toFixed(1);}).join(" L ")+" Z";
  window.__pendingImport={circuitId,layoutId,Q:tmpGeo.pts,lengthM,fname,origin:window.__importOrigin||null};window.__importOrigin=null;
  openModal(`<h2>Import preview</h2>
    <div class="small muted">${esc(c.name)} · ${esc(l.name)} · from ${esc(fname)}</div>
    <div class="mapwrap" style="margin:10px 0"><svg viewBox="0 0 300 220"><path d="${path}" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/></svg></div>
    <div class="card dark flat">
      <div class="row between"><span class="small">Measured length</span><span class="laptime">${(lengthM/1000).toFixed(3)} km</span></div>
      ${off?`<div class="row between"><span class="small">Official length</span><span class="laptime">${(off/1000).toFixed(3)} km ${err<0.05?"✓":`(Δ ${(err*100).toFixed(0)}% — check the file)`}</span></div>`:""}
      <div class="row between"><span class="small">Loop closure gap</span><span class="laptime">${gap.toFixed(0)} m ${gap<40?"✓":"(open track?)"}</span></div>
      ${scaleNote?`<div class="small muted" style="margin-top:4px">${esc(scaleNote)}</div>`:""}
    </div>
    <div class="field"><label>Riding direction as recorded</label>
      <div class="chips">
        <button class="chip on" data-action="chipPick" data-group="impdir" data-v="keep">As in file</button>
        <button class="chip" data-action="chipPick" data-group="impdir" data-v="reverse">Reverse</button>
      </div></div>
    <p class="small muted">Point 1 of the file becomes the start/finish — you can move it afterwards with the adjust tool. Corners are auto-detected from curvature.</p>
    <div class="btnrow">
      <button class="btn" data-action="confirmImportGeo">Save layout map</button>
      <button class="btn sec slim" data-action="closeModal">Cancel</button>
    </div>`);
}
function detectCornersJS(pts,target){
  const R=crSpline(pts,4);const n=R.length;
  const turn=[];
  for(let i=0;i<n;i++){
    const a=R[(i-1+n)%n],b=R[i],cc=R[(i+1)%n];
    let dd=Math.atan2(cc[1]-b[1],cc[0]-b[0])-Math.atan2(b[1]-a[1],b[0]-a[0]);
    while(dd>Math.PI)dd-=2*Math.PI;while(dd<-Math.PI)dd+=2*Math.PI;
    turn.push(dd);
  }
  const W=4;
  const sm=[];for(let i=0;i<n;i++){let s=0;for(let k=-W;k<=W;k++)s+=turn[(i+k+n)%n];sm.push(s);}
  function regions(thr){
    const vis=new Array(n).fill(false);const rg=[];
    for(let s0=0;s0<n;s0++){
      if(vis[s0]||Math.abs(sm[s0])<=thr)continue;
      const sgn=Math.sign(sm[s0]);let j=s0,tot=0,peak=s0,pv=0;
      while(Math.abs(sm[j])>thr&&Math.sign(sm[j])===sgn&&!vis[j]){
        vis[j]=true;tot+=turn[j];if(Math.abs(sm[j])>pv){pv=Math.abs(sm[j]);peak=j;}
        j=(j+1)%n;if(j===s0)break;
      }
      if(Math.abs(tot)>0.14)rg.push({total:Math.abs(tot),apex:peak});
    }
    return rg;
  }
  let best=null;
  for(const th of[0.02,0.03,0.04,0.05,0.07,0.09,0.12,0.16,0.2,0.26]){
    const rg=regions(th);
    if(!best||Math.abs(rg.length-target)<Math.abs(best.length-target))best=rg;
    if(rg.length===target){best=rg;break;}
  }
  best.sort((a,b)=>b.total-a.total);
  const kept=best.slice(0,Math.max(1,target)).sort((a,b)=>a.apex-b.apex);
  return kept.map((r,i)=>({n:i+1,x:Math.round(R[r.apex][0]*10)/10,y:Math.round(R[r.apex][1]*10)/10}));
}
Actions.confirmImportGeo=()=>{
  const pend=window.__pendingImport;if(!pend)return;
  let pts=pend.Q;
  if(pickedChip("impdir")==="reverse")pts=[...pts].reverse();
  const c=circuitById(pend.circuitId),l=layoutOf(c,pend.layoutId);
  // direction label from winding
  let s2=0;for(let i=0;i<pts.length;i++){const a=pts[i],b=pts[(i+1)%pts.length];s2+=a[0]*b[1]-b[0]*a[1];}
  const dir=s2>0?"CCW":"CW";
  const corners=detectCornersJS(pts,clamp(l.corners||12,1,30));
  S.importedGeo=S.importedGeo||{};
  S.importedGeo[pend.circuitId+"/"+pend.layoutId]={
    pts,origin:pend.origin||null,dir,corners,lengthM:pend.lengthM,officialM:l?Math.round(l.lengthKm*1000):null,
    source:"user import: "+pend.fname,sfNote:"start/finish at file start point",sfApprox:true,
    verified:"user",cornerSource:"corner positions auto-detected from imported geometry",t1:1
  };
  window.__pendingImport=null;
  save();closeModal();render();toast("Layout map imported — use adjust to fine-tune S/F and T1");
};


/* ============================================================
   ANDROID / BROWSER BACK BUTTON
   One sentinel history entry; system back = in-app back:
   modal -> close, detail -> list, tab -> home, home -> exit.
   Modals never touch history, so chained modals can't race.
============================================================ */
function handleAppBack(){
  if($("#modals").firstChild){closeModal();return true;}
  if(route.dayId||route.circuitId||route.bikeId){go(route.tab);return true;}
  if(route.tab!=="home"){go("home");return true;}
  return false; // nothing left — allow the app to exit
}
(function backTrap(){
  try{
    history.replaceState({apex:"root"},"");
    history.pushState({apex:"app"},"");
  }catch(e){return;} // history API unavailable (some file:// contexts)
  window.addEventListener("popstate",()=>{
    if(handleAppBack()){
      try{history.pushState({apex:"app"},"");}catch(e){}
    }else{
      try{history.back();}catch(e){}
    }
  });
})();

Actions.shareDay=async el=>{
  const d=S.trackdays.find(x=>x.id===el.dataset.id);
  const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId),b=bikeById(d.bikeId),st=dayStats(d);
  const W=1080,H=1350;
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const g=cv.getContext("2d");
  g.fillStyle="#15171c";g.fillRect(0,0,W,H);
  // header
  g.fillStyle="#FF521F";g.beginPath();g.roundRect(64,64,84,84,22);g.fill();
  g.strokeStyle="#fff";g.lineWidth=9;g.lineJoin="round";g.beginPath();
  g.moveTo(80,120);g.lineTo(104,120);g.lineTo(118,94);g.lineTo(132,94);g.stroke();
  g.fillStyle="#f2f0e9";g.font="800 46px system-ui,sans-serif";g.fillText("APEXBOOK",170,122);
  // title
  g.font="900 64px system-ui,sans-serif";
  g.fillText(c?c.name:"Track day",64,240);
  g.fillStyle="#9aa0ab";g.font="500 34px system-ui,sans-serif";
  g.fillText([l&&c.layouts.length>1?l.name:null,fmtDate(d.date),b?b.brand+" "+b.model:null].filter(Boolean).join("  ·  "),64,296);
  // map
  const geo=geoFor(d.circuitId,d.layoutId);
  if(geo){
    const sp=crSpline(geo.pts,4);
    let mnx=1/0,mxx=-1/0,mny=1/0,mxy=-1/0;
    for(const p of sp){mnx=Math.min(mnx,p[0]);mxx=Math.max(mxx,p[0]);mny=Math.min(mny,p[1]);mxy=Math.max(mxy,p[1]);}
    const bw=W-128,bh=480,sc=Math.min(bw/(mxx-mnx),bh/(mxy-mny));
    const ox=(W-(mxx-mnx)*sc)/2,oy=340+(bh-(mxy-mny)*sc)/2;
    g.strokeStyle="#3a3f4a";g.lineWidth=26;g.lineJoin="round";g.lineCap="round";g.beginPath();
    sp.forEach((p,i)=>{const x=ox+(p[0]-mnx)*sc,y=oy+(mxy-p[1])*sc;i?g.lineTo(x,y):g.moveTo(x,y);});
    g.closePath();g.stroke();
    g.strokeStyle="#FF521F";g.lineWidth=5;g.setLineDash([2,16]);g.stroke();g.setLineDash([]);
    g.fillStyle="#9aa0ab";g.font="500 24px system-ui,sans-serif";g.textAlign="right";
    g.fillText("© OpenStreetMap contributors",W-64,340+bh+8);g.textAlign="left";
  }
  // stats row
  const y0=920;
  const cell=(x,label,val,big)=>{
    g.fillStyle="#1d2027";g.beginPath();g.roundRect(x,y0,296,180,26);g.fill();
    g.fillStyle="#9aa0ab";g.font="700 26px system-ui,sans-serif";g.fillText(label,x+28,y0+52);
    g.fillStyle=big?"#FF521F":"#f2f0e9";g.font="800 "+(big?"58":"52")+"px ui-monospace,monospace";
    g.fillText(val,x+28,y0+130);
  };
  cell(64,"BEST LAP",fmtLap(st.best,true)||"—",true);
  cell(392,"AVERAGE",fmtLap(st.avg,true)||"—");
  cell(720,"CONSISTENCY",st.consistency!=null?String(st.consistency):"—");
  g.fillStyle="#9aa0ab";g.font="500 32px system-ui,sans-serif";
  const wline=[st.n+" laps",(d.sessions||[]).length+" sessions",d.condition,d.weather?`${d.weather.temp}°C ${d.weather.summary}`:null].filter(Boolean).join("  ·  ");
  g.fillText(wline,64,y0+250);
  g.fillStyle="#565d69";g.font="500 26px system-ui,sans-serif";
  g.fillText("Logged with Apexbook — my season, one lap at a time",64,H-64);
  // export
  const blob=await new Promise(r=>cv.toBlob(r,"image/png"));
  const file=new File([blob],`apexbook-${d.date}.png`,{type:"image/png"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"Track day at "+(c?c.name:"")});return;}catch(e){/* fall through to download */}
  }
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=file.name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast("Summary image downloaded");
};

      <div class="btnrow"><button class="btn sec slim" data-action="exportJSON">⬇ Full JSON backup</button>
      <button class="btn sec slim" data-action="importJSON">⬆ Restore backup</button></div>
      <div class="btnrow"><button class="btn sec slim" data-action="exportLapsCSV">Laps CSV</button>
      <button class="btn sec slim" data-action="exportDaysCSV">Track days CSV</button></div>
      <button class="btn sec slim" data-action="printSummary">🖨 Printable day summary</button>
    </div>

    <button class="btn sec" data-action="editChecklists">🎒 Packing checklists</button>
    <button class="btn danger" style="margin-top:8px" data-action="resetApp">Reset app (load sample data)</button>`);
};
Actions.setName=el=>{S.settings.riderName=el.value.trim();save();};
Actions.setCurrency=el=>{S.settings.currency=el.value.trim()||"€";save();};
Actions.setTheme=el=>{
  S.settings.theme=el.dataset.v;
  document.body.dataset.theme=S.settings.theme;
  save();Actions.openSettings();
};
Actions.setMode=el=>{S.settings.basicMode=el.dataset.v==="1";save();Actions.openSettings();};
function download(name,content,type){
  const blob=new Blob([content],{type:type||"application/octet-stream"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
Actions.exportJSON=async()=>{
  const photos=await DB.allPhotos();
  download(`apexbook-backup-${todayISO()}.json`,JSON.stringify({app:"apexbook",exported:new Date().toISOString(),state:S,photos},null,1),"application/json");
  S.lastBackupAt=todayISO();save();closeModal();toast("Backup downloaded — keep it somewhere safe");
};
Actions.importJSON=()=>{
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async()=>{
      try{
        const data=JSON.parse(r.result);
        if(!data.state||data.app!=="apexbook")throw new Error("not an Apexbook backup");
        S=data.state;
        for(const[id,d]of Object.entries(data.photos||{})){await DB.putPhoto(id,d);PhotoCache[id]=d;}
        document.body.dataset.theme=S.settings.theme||"dark";
        await saveNow();closeModal();render();toast("Backup restored");
      }catch(e){toast("Restore failed: "+e.message);}
    };
    r.readAsText(f);
  };
  inp.click();
};
Actions.exportLapsCSV=()=>{
  let csv="date,circuit,layout,bike,session,lap,time,time_ms,invalid,outlap,inlap,wet,note\n";
  for(const d of daysSorted()){
    const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId),b=bikeById(d.bikeId);
    (d.sessions||[]).forEach(s=>{
      (s.laps||[]).forEach((lp,i)=>{
        csv+=[d.date,q(c?.name),q(l?.name),q(b?.model),q(s.name),i+1,fmtLap(lp.ms),lp.ms,
          lp.invalid?1:0,lp.outlap?1:0,lp.inlap?1:0,lp.wet?1:0,q(lp.note)].join(",")+"\n";
      });
    });
  }
  download(`apexbook-laps-${todayISO()}.csv`,csv,"text/csv");
  function q(v){return v?'"'+String(v).replace(/"/g,'""')+'"':"";}
};
Actions.exportDaysCSV=()=>{
  let csv="date,circuit,layout,bike,organiser,condition,sessions,laps,best,average,consistency,total_cost\n";
  for(const d of daysSorted()){
    const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId),b=bikeById(d.bikeId),st=dayStats(d);
    const cost=Object.values(d.costs||{}).reduce((a,x)=>a+(+x||0),0);
    csv+=[d.date,q(c?.name),q(l?.name),q(b?.model),q(d.organiser),d.condition,(d.sessions||[]).length,st.n,
      fmtLap(st.best),fmtLap(st.avg),st.consistency??"",cost].join(",")+"\n";
  }
  download(`apexbook-trackdays-${todayISO()}.csv`,csv,"text/csv");
  function q(v){return v?'"'+String(v).replace(/"/g,'""')+'"':"";}
};
Actions.printSummary=()=>{
  const days=daysSorted();
  openModal(`<h2>Printable summary</h2>
    <div class="field"><label>Choose a track day</label>
      <select id="f_printday">${days.map(d=>`<option value="${d.id}">${fmtDate(d.date)} — ${esc(circuitLabel(d))}</option>`).join("")}</select></div>
    <button class="btn" data-action="reallyPrint">Open print view</button>`);
};
Actions.reallyPrint=()=>{
  const d=S.trackdays.find(x=>x.id===$("#f_printday").value);
  const c=circuitById(d.circuitId),l=layoutOf(c,d.layoutId),b=bikeById(d.bikeId),st=dayStats(d);
  const w=window.open("","_blank");
  const rows=(d.sessions||[]).map((s,i)=>{const ss=lapStats(s.laps);
    return`<tr><td>${esc(s.name)}</td><td>${esc(s.start||"")}</td><td>${esc(s.condition||"")}</td><td>${ss.n}</td><td>${fmtLap(ss.best)}</td><td>${fmtLap(ss.avg)}</td><td>${ss.consistency??""}</td></tr>`;}).join("");
  const setup=SETUP_FIELDS.filter(([k])=>(d.setup||{})[k]).map(([k,lb])=>`<tr><td>${lb}</td><td>${esc(d.setup[k])}</td></tr>`).join("");
  w.document.write(`<html><head><title>Apexbook — ${esc(c?.name)}</title><style>
    body{font-family:Arial,sans-serif;margin:32px;color:#111}
    h1{margin:0}h2{border-bottom:2px solid #ff521f;padding-bottom:4px;font-size:15px;margin-top:22px}
    table{border-collapse:collapse;width:100%;font-size:12px}td,th{border:1px solid #ccc;padding:5px;text-align:left}
    .meta{color:#555;font-size:13px}.mono{font-family:monospace}</style></head><body>
    <h1>${esc(c?.name)} ${l&&c.layouts.length>1?"· "+esc(l.name):""}</h1>
    <div class="meta">${fmtDate(d.date)} · ${esc(b?b.brand+" "+b.model:"")} · ${esc(d.organiser||"")} · ${esc(d.condition||"")}
    ${d.weather?` · ${d.weather.temp}°C, ${esc(d.weather.summary)}`:""}</div>
    <h2>Result</h2>
    <table><tr><th>Best</th><th>Average</th><th>Median</th><th>Laps</th><th>Spread</th><th>Consistency</th></tr>
    <tr class="mono"><td>${fmtLap(st.best)}</td><td>${fmtLap(st.avg)}</td><td>${fmtLap(st.median)}</td><td>${st.n}</td><td>${st.spread!=null?(st.spread/1000).toFixed(2)+"s":""}</td><td>${st.consistency??""}</td></tr></table>
    <h2>Sessions</h2>
    <table><tr><th>Session</th><th>Start</th><th>Cond.</th><th>Laps</th><th>Best</th><th>Avg</th><th>Consistency</th></tr>${rows}</table>
    ${setup?`<h2>Setup</h2><table>${setup}</table>`:""}
    ${d.notes?`<h2>Notes</h2><p>${esc(d.notes)}</p>`:""}
    ${d.lessons?`<h2>Lessons learned</h2><p>${esc(d.lessons)}</p>`:""}
    ${d.nextPriorities?`<h2>Priorities for next visit</h2><p>${esc(d.nextPriorities)}</p>`:""}
    <script>window.print()<\/script></body></html>`);
  w.document.close();
};
Actions.resetApp=()=>{
  openModal(`<h2>Reset the app?</h2><p class="small muted">All your data on this device is replaced with the demo sample data. Export a backup first if in doubt.</p>
    <div class="btnrow"><button class="btn sec" data-action="closeModal">Cancel</button>
    <button class="btn danger" data-action="reallyReset">Reset</button></div>`);
};
Actions.reallyReset=async()=>{
  S=await buildSampleState();
  document.body.dataset.theme=S.settings.theme;
  await saveNow();closeModal();go("home");toast("Sample data loaded");
};

  openModal(`<h2>Packing checklists</h2>
    ${S.checklists.map(cl=>`
      <div class="card dark flat">
        <div class="row between"><input type="text" value="${esc(cl.name)}" style="font-weight:800" data-change="clName" data-id="${cl.id}">

Actions.clName=el=>{S.checklists.find(x=>x.id===el.dataset.id).name=el.value.trim()||"Checklist";save();};
Actions.clItems=el=>{S.checklists.find(x=>x.id===el.dataset.id).items=el.value.split("\n").map(s=>s.trim()).filter(Boolean);save();};
Actions.delChecklist=el=>{S.checklists=S.checklists.filter(x=>x.id!==el.dataset.id);save();Actions.editChecklists();};
Actions.addChecklist=()=>{S.checklists.push({id:uid(),name:"New checklist",items:PACK_DEFAULT.slice()});save();Actions.editChecklists();};

   INIT
============================================================ */
(async function init(){
  await DB.init();
  let st=await DB.getState();
  if(!st){
    st=await buildSampleState();
    await DB.setState(st);
  }
  S=st;
  // migrations / safety defaults
  S.settings=S.settings||{theme:"dark",currency:"€"};
  S.customCircuits=S.customCircuits||[];S.circuitEdits=S.circuitEdits||{};
  S.favourites=S.favourites||[];S.plans=S.plans||[];S.presets=S.presets||[];
  S.checklists=S.checklists&&S.checklists.length?S.checklists:[{id:uid(),name:"Standard track day",items:PACK_DEFAULT.slice()}];
  S.maintenance=S.maintenance||[];S.annotations=S.annotations||{};S.geoOverrides=S.geoOverrides||{};S.importedGeo=S.importedGeo||{};S.tyreSets=S.tyreSets||[];
  document.body.dataset.theme=S.settings.theme||"dark";
  try{navigator.storage&&navigator.storage.persist&&navigator.storage.persist();}catch(e){}
  route.tab=["home","diary","tracks","garage","progress"].includes(S.lastTab)?S.lastTab:"home";
  render();
  autoPlanForecast();
})();

/* ---- PWA: service worker + install ---- */
if("serviceWorker" in navigator && (location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1")){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
    let refreshed=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(refreshed)return;refreshed=true;location.reload();
    });
  });
}
let __installEvt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();__installEvt=e;
  const chip=$("#syncchip");
  if(chip&&!$("#installBtn")){
    const b=document.createElement("button");
    b.id="installBtn";b.className="statuschip";b.style.cursor="pointer";
    b.innerHTML="⬇ Install app";
    b.onclick=async()=>{__installEvt.prompt();await __installEvt.userChoice;b.remove();__installEvt=null;};
    chip.after(b);
  }
});
</script>
